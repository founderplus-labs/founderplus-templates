<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- TODO: ganti nama toko -->
    <title>Toko Kamu — Katalog</title>
    <meta name="description" content="Katalog produk. Pilih, masukkan keranjang, pesan lewat WhatsApp." />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f0f12" media="(prefers-color-scheme: dark)" />
    <style>
      /* ─────────────────────────────────────────────────────────────
         Katalog / toko online — desain orisinal, self-contained.
         Ikon inline SVG, foto placeholder = CSS. Order lewat WhatsApp
         (jalan hari ini) atau checkout Founder+ (spec-driven).
         Edit blok SHOP + PRODUCTS. Ganti warna via --accent.
         ───────────────────────────────────────────────────────────── */
      :root {
        --bg: #f6f6f7; --card: #ffffff; --ink: #17171b; --secondary: #55555f; --muted: #8a8a94;
        --line: #e9e9ee; --accent: #8b5cf6; --accent-ink: #6d28d9; --ok: #17984e;
        --r: 16px; --ease-out: cubic-bezier(0.23,1,0.32,1); --ease-drawer: cubic-bezier(0.32,0.72,0,1);
        --safe-t: env(safe-area-inset-top,0px); --safe-b: env(safe-area-inset-bottom,0px);
      }
      @media (prefers-color-scheme: dark) {
        :root { --bg:#0f0f12; --card:#17171c; --ink:#f3f3f6; --secondary:#b3b3bd; --muted:#8a8a94;
          --line:#26262e; --accent:#a78bfa; --accent-ink:#c4b5fd; }
      }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      body { margin: 0; background: var(--bg); color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; -webkit-font-smoothing: antialiased;
        line-height: 1.5; padding-bottom: calc(96px + var(--safe-b)); }
      svg { display: block; } .ico { stroke: currentColor; fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
      .wrap { max-width: 720px; margin: 0 auto; padding: 0 16px; }

      header { position: sticky; top: 0; z-index: 20; padding: calc(14px + var(--safe-t)) 0 12px;
        background: color-mix(in srgb, var(--bg) 82%, transparent);
        backdrop-filter: saturate(1.4) blur(16px); -webkit-backdrop-filter: saturate(1.4) blur(16px);
        border-bottom: 1px solid var(--line); }
      header .row { display: flex; align-items: center; gap: 12px; }
      .shop { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; flex: 1; min-width: 0;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .cart-btn { position: relative; width: 40px; height: 40px; border-radius: 999px; border: none; cursor: pointer;
        background: var(--card); box-shadow: inset 0 0 0 1px var(--line); color: var(--ink); display: grid; place-items: center;
        transition: transform 150ms var(--ease-out); }
      .cart-btn:active { transform: scale(0.9); } .cart-btn svg { width: 19px; height: 19px; }
      .cart-btn .badge { position: absolute; top: -4px; right: -4px; min-width: 18px; height: 18px; padding: 0 5px;
        background: var(--accent); color: #fff; border-radius: 999px; font-size: 11px; font-weight: 700; display: grid; place-items: center; }

      .cats { display: flex; gap: 8px; overflow-x: auto; padding: 14px 0 4px; scrollbar-width: none; }
      .cats::-webkit-scrollbar { display: none; }
      .cats button { flex: 0 0 auto; border: none; cursor: pointer; background: var(--card); color: var(--secondary);
        font: inherit; font-weight: 600; font-size: 13.5px; padding: 8px 15px; border-radius: 999px; white-space: nowrap;
        box-shadow: inset 0 0 0 1px var(--line); transition: all 160ms var(--ease-out); }
      .cats button[aria-current="true"] { background: var(--ink); color: var(--bg); box-shadow: inset 0 0 0 1px var(--ink); }

      .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; padding: 16px 0 8px; }
      @media (min-width: 560px) { .grid { grid-template-columns: repeat(3, 1fr); } }
      .prod { background: var(--card); border-radius: var(--r); overflow: hidden; box-shadow: inset 0 0 0 1px var(--line);
        display: flex; flex-direction: column; }
      .prod .ph { aspect-ratio: 1 / 1; display: grid; place-items: center; color: color-mix(in srgb, var(--ink) 26%, transparent);
        background: color-mix(in srgb, var(--ink) 5%, var(--card)); position: relative; }
      .prod .ph img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
      .prod .ph svg { width: 34px; height: 34px; }
      .prod.out .ph { filter: grayscale(0.6); opacity: 0.7; }
      .prod .info { padding: 12px 13px 13px; display: flex; flex-direction: column; gap: 3px; flex: 1; }
      .prod .nm { font-weight: 640; font-size: 14.5px; letter-spacing: -0.01em; }
      .prod .ds { font-size: 12px; color: var(--muted); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
      .prod .pr { font-weight: 700; font-size: 14.5px; margin-top: auto; padding-top: 6px; letter-spacing: -0.01em; }
      .prod .act { padding: 0 13px 13px; }
      .prod .add { width: 100%; border: none; cursor: pointer; background: color-mix(in srgb, var(--accent) 12%, transparent);
        color: var(--accent-ink); font: inherit; font-weight: 700; font-size: 13.5px; padding: 10px; border-radius: 11px;
        transition: transform 150ms var(--ease-out), background 160ms var(--ease-out); }
      .prod .add:hover { background: color-mix(in srgb, var(--accent) 18%, transparent); }
      .prod .add:active { transform: scale(0.96); }
      .prod .stepper { display: flex; align-items: center; gap: 2px; justify-content: space-between;
        background: color-mix(in srgb, var(--accent) 10%, transparent); border-radius: 11px; padding: 4px; }
      .prod .stepper button { width: 34px; height: 30px; border: none; background: transparent; cursor: pointer; color: var(--accent-ink); font-size: 18px; border-radius: 8px; }
      .prod .stepper button:active { transform: scale(0.9); }
      .prod .stepper .q { font-weight: 700; font-variant-numeric: tabular-nums; }
      .soldout { text-align: center; font-size: 12px; color: var(--muted); font-weight: 600; padding: 10px; }

      /* Cart bar + sheet */
      .cartbar { position: fixed; left: 0; right: 0; bottom: 0; z-index: 25; padding: 12px 16px calc(12px + var(--safe-b));
        background: color-mix(in srgb, var(--bg) 84%, transparent);
        backdrop-filter: saturate(1.4) blur(16px); -webkit-backdrop-filter: saturate(1.4) blur(16px);
        border-top: 1px solid var(--line); transform: translateY(140%); transition: transform 400ms var(--ease-drawer); }
      .cartbar.show { transform: none; }
      .cartbar .go { max-width: 720px; margin: 0 auto; width: 100%; border: none; cursor: pointer;
        display: flex; align-items: center; justify-content: space-between; gap: 12px;
        background: var(--ink); color: var(--bg); padding: 15px 18px; border-radius: 14px; font: inherit; font-size: 16px; font-weight: 650; }
      .cartbar .go .amt { font-weight: 800; letter-spacing: -0.01em; font-variant-numeric: tabular-nums; }
      .cartbar .go .count { background: color-mix(in srgb, var(--bg) 22%, transparent); border-radius: 999px; padding: 1px 8px; font-size: 13px; margin-left: 8px; }

      dialog { border: none; padding: 0; width: 100%; max-width: 560px; color: var(--ink); background: var(--card);
        margin: auto auto 0; border-radius: 22px 22px 0 0; max-height: 88vh; box-shadow: 0 -10px 40px rgba(0,0,0,0.2);
        transform: translateY(100%); transition: transform 440ms var(--ease-drawer), overlay 440ms allow-discrete, display 440ms allow-discrete; }
      dialog[open] { transform: none; }
      @starting-style { dialog[open] { transform: translateY(100%); } }
      dialog::backdrop { background: rgba(10,10,14,0); transition: background 440ms var(--ease-out), overlay 440ms allow-discrete, display 440ms allow-discrete; }
      dialog[open]::backdrop { background: rgba(10,10,14,0.45); }
      @starting-style { dialog[open]::backdrop { background: rgba(10,10,14,0); } }
      .grabber { width: 38px; height: 5px; border-radius: 3px; background: var(--line); margin: 10px auto 0; }
      .sin { padding: 12px 18px calc(20px + var(--safe-b)); overflow-y: auto; }
      .sin h3 { margin: 6px 0 12px; font-size: 18px; letter-spacing: -0.015em; }
      .cline { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--line); }
      .cline:last-of-type { border-bottom: none; }
      .cline .cph { width: 46px; height: 46px; border-radius: 11px; flex: 0 0 46px; display: grid; place-items: center;
        background: color-mix(in srgb, var(--ink) 5%, var(--card)); color: color-mix(in srgb, var(--ink) 28%, transparent); position: relative; overflow: hidden; }
      .cline .cph img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; } .cline .cph svg { width: 20px; height: 20px; }
      .cline .ci { flex: 1; min-width: 0; } .cline .cn { font-weight: 600; font-size: 14.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .cline .cp { font-size: 12.5px; color: var(--muted); margin-top: 2px; font-variant-numeric: tabular-nums; }
      .cstep { display: inline-flex; align-items: center; gap: 2px; background: var(--bg); border-radius: 999px; padding: 0 3px; box-shadow: inset 0 0 0 1px var(--line); }
      .cstep button { width: 28px; height: 28px; border: none; background: transparent; cursor: pointer; color: var(--accent-ink); font-size: 17px; border-radius: 999px; }
      .cstep .cq { min-width: 18px; text-align: center; font-weight: 700; font-size: 14px; font-variant-numeric: tabular-nums; }
      .total-row { display: flex; justify-content: space-between; align-items: baseline; font-weight: 800; font-size: 19px; letter-spacing: -0.02em; margin: 16px 0 4px; }
      .total-row span:last-child { font-variant-numeric: tabular-nums; }
      textarea, input { width: 100%; border: none; box-shadow: inset 0 0 0 1px var(--line); border-radius: 12px; padding: 12px 13px; font: inherit; margin-top: 10px; background: var(--bg); color: var(--ink); }
      textarea:focus, input:focus { outline: none; box-shadow: inset 0 0 0 2px var(--accent); } textarea { resize: none; }
      .send { width: 100%; margin-top: 14px; border: none; cursor: pointer; background: var(--ok); color: #fff; font: inherit; font-weight: 700; font-size: 16px; padding: 15px; border-radius: 14px; }
      .send:active { transform: scale(0.985); } .send[disabled] { opacity: 0.45; }
      .close { position: absolute; top: 14px; right: 16px; width: 30px; height: 30px; display: grid; place-items: center; border: none; border-radius: 999px; background: var(--bg); color: var(--muted); font-size: 16px; cursor: pointer; }
      .empty { text-align: center; color: var(--muted); padding: 40px 20px; }
      footer { text-align: center; color: var(--muted); font-size: 12.5px; padding: 22px 0; }
      footer a { color: var(--accent-ink); text-decoration: none; }
      @media (prefers-reduced-motion: reduce) { .cartbar, dialog, dialog::backdrop { transition: opacity 200ms ease !important; transform: none !important; } }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap row">
        <div class="shop" id="shopName">Toko Kamu</div>
        <button class="cart-btn" id="openCart" aria-label="Keranjang">
          <svg class="ico" viewBox="0 0 24 24"><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/><path d="M2 3h3l2.4 12.4a2 2 0 0 0 2 1.6h8.2a2 2 0 0 0 2-1.6L22 7H6"/></svg>
          <span class="badge" id="cartBadge" hidden>0</span>
        </button>
      </div>
    </header>

    <main class="wrap">
      <nav class="cats" id="cats"></nav>
      <div class="grid" id="grid"></div>
      <footer>Ditenagai <a href="https://founderplus.id" target="_blank" rel="noopener">Founder+</a></footer>
    </main>

    <div class="cartbar" id="cartbar">
      <button class="go" id="openCart2" type="button">
        <span>Lihat keranjang <span class="count" id="cartCount">0</span></span>
        <span class="amt" id="cartTotal">Rp 0</span>
      </button>
    </div>

    <dialog id="cart">
      <div class="grabber"></div>
      <button class="close" id="cartClose" aria-label="Tutup">✕</button>
      <div class="sin">
        <h3>Keranjang</h3>
        <div id="cartLines"></div>
        <div class="total-row"><span>Total</span><span id="sheetTotal">Rp 0</span></div>
        <input id="buyerName" type="text" placeholder="Nama (opsional)" autocomplete="name" />
        <input id="buyerAddr" type="text" placeholder="Alamat / catatan (opsional)" />
        <button class="send" id="order" type="button">Pesan via WhatsApp</button>
      </div>
    </dialog>

    <script>
      // ══════════════════════════ SHOP ══════════════════════════
      const SHOP = {
        name: "Toko Kamu",
        whatsapp: "6281234567890",   // WA penjual, format 62… tanpa +
        currency: "IDR",
        founderplus: { projectId: "" }, // GTM opsional (spec-driven)
      };

      // ══════════════════════════ PRODUCTS ══════════════════════════
      // available:false → habis. image (opsional) = URL foto. category → filter.
      const PRODUCTS = [
        { id: "kaos-hitam", name: "Kaos Polos Hitam", desc: "Cotton combed 30s, unisex", price: 89000, category: "Pakaian", available: true },
        { id: "kaos-putih", name: "Kaos Polos Putih", desc: "Cotton combed 30s, unisex", price: 89000, category: "Pakaian", available: true },
        { id: "totebag", name: "Tote Bag Kanvas", desc: "Kanvas tebal, sablon custom", price: 65000, category: "Aksesoris", available: true },
        { id: "topi", name: "Topi Baseball", desc: "Adjustable, bordir logo", price: 75000, category: "Aksesoris", available: false },
        { id: "mug", name: "Mug Keramik", desc: "330ml, print full color", price: 55000, category: "Aksesoris", available: true },
        { id: "hoodie", name: "Hoodie Fleece", desc: "Cotton fleece, hangat", price: 189000, category: "Pakaian", available: true },
      ];
      // ═════════════════════════════════════════════════════════════

      const $ = (id) => document.getElementById(id);
      const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
      const fmt = (n) => SHOP.currency === "IDR" ? "Rp " + Number(n||0).toLocaleString("id-ID") : Number(n||0).toLocaleString("en-US", { style:"currency", currency: SHOP.currency });
      const box = `<svg class="ico" viewBox="0 0 24 24"><path d="M21 8l-9-5-9 5 9 5 9-5zM3 8v8l9 5 9-5V8"/><path d="M12 13v8"/></svg>`;
      const cart = new Map();
      const byId = (id) => PRODUCTS.find((p) => p.id === id);
      let filter = "Semua";

      function categories() { return ["Semua", ...new Set(PRODUCTS.map((p) => p.category))]; }
      function money() { let t=0,c=0; for (const [id,q] of cart){ const p=byId(id); if(p){t+=p.price*q;c+=q;} } return {t,c}; }

      function renderCats() {
        $("cats").innerHTML = categories().map((c) =>
          `<button type="button" data-c="${esc(c)}" ${c===filter?'aria-current="true"':''}>${esc(c)}</button>`).join("");
      }
      $("cats").addEventListener("click", (e) => { const b=e.target.closest("[data-c]"); if(!b)return; filter=b.dataset.c; renderCats(); renderGrid(); });

      function phHtml(p) { return p.image ? `<img src="${esc(p.image)}" alt="" loading="lazy">` : box; }

      function renderGrid() {
        const list = PRODUCTS.filter((p) => filter === "Semua" || p.category === filter);
        $("grid").innerHTML = "";
        for (const p of list) {
          const el = document.createElement("div");
          el.className = "prod" + (p.available ? "" : " out");
          el.innerHTML =
            `<div class="ph">${phHtml(p)}</div>` +
            `<div class="info"><div class="nm">${esc(p.name)}</div>${p.desc?`<div class="ds">${esc(p.desc)}</div>`:""}<div class="pr">${esc(fmt(p.price))}</div></div>` +
            `<div class="act" data-act="${p.id}">${p.available ? ctrl(p.id) : `<div class="soldout">Habis</div>`}</div>`;
          $("grid").appendChild(el);
        }
      }
      function ctrl(id) {
        const q = cart.get(id) || 0;
        if (q <= 0) return `<button class="add" type="button" data-add="${id}">+ Keranjang</button>`;
        return `<div class="stepper"><button type="button" data-dec="${id}">−</button><span class="q">${q}</span><button type="button" data-inc="${id}">+</button></div>`;
      }
      function setQty(id, q) {
        if (q <= 0) cart.delete(id); else cart.set(id, q);
        const slot = $("grid").querySelector(`[data-act="${id}"]`); if (slot) slot.innerHTML = ctrl(id);
        renderBar(); if ($("cart").open) renderCart();
      }
      $("grid").addEventListener("click", (e) => {
        const b = e.target.closest("button"); if (!b) return;
        if (b.dataset.add) setQty(b.dataset.add, 1);
        else if (b.dataset.inc) setQty(b.dataset.inc, (cart.get(b.dataset.inc)||0)+1);
        else if (b.dataset.dec) setQty(b.dataset.dec, (cart.get(b.dataset.dec)||0)-1);
      });

      function renderBar() {
        const { t, c } = money();
        $("cartCount").textContent = c; $("cartTotal").textContent = fmt(t);
        $("cartbar").classList.toggle("show", c > 0);
        $("cartBadge").hidden = c === 0; $("cartBadge").textContent = c;
      }

      function renderCart() {
        const wrap = $("cartLines"); wrap.innerHTML = "";
        if (cart.size === 0) { wrap.innerHTML = `<div class="empty">Keranjang kosong.</div>`; }
        else for (const [id, q] of cart) {
          const p = byId(id); if (!p) continue;
          const row = document.createElement("div"); row.className = "cline";
          row.innerHTML =
            `<div class="cph">${phHtml(p)}</div>` +
            `<div class="ci"><div class="cn">${esc(p.name)}</div><div class="cp">${esc(fmt(p.price))} · ${esc(fmt(p.price*q))}</div></div>` +
            `<div class="cstep"><button type="button" data-cdec="${id}">−</button><span class="cq">${q}</span><button type="button" data-cinc="${id}">+</button></div>`;
          wrap.appendChild(row);
        }
        $("sheetTotal").textContent = fmt(money().t);
        $("order").disabled = cart.size === 0;
      }
      $("cartLines").addEventListener("click", (e) => {
        const b = e.target.closest("button"); if (!b) return;
        if (b.dataset.cinc) setQty(b.dataset.cinc, (cart.get(b.dataset.cinc)||0)+1);
        else if (b.dataset.cdec) setQty(b.dataset.cdec, (cart.get(b.dataset.cdec)||0)-1);
      });

      function openCart() { renderCart(); $("cart").showModal(); }
      $("openCart").onclick = openCart; $("openCart2").onclick = openCart;
      $("cartClose").onclick = () => $("cart").close();
      $("cart").addEventListener("click", (e) => { if (e.target === $("cart")) $("cart").close(); });

      $("order").onclick = () => {
        if (cart.size === 0) return;
        const name = $("buyerName").value.trim(), addr = $("buyerAddr").value.trim();
        const lines = []; for (const [id, q] of cart) { const p = byId(id); if (p) lines.push(`• ${q}× ${p.name} — ${fmt(p.price*q)}`); }
        const text =
          `Halo ${SHOP.name}! Mau pesan:\n${lines.join("\n")}\nTotal: ${fmt(money().t)}` +
          (name ? `\nNama: ${name}` : "") + (addr ? `\nAlamat/catatan: ${addr}` : "");
        location.href = `https://wa.me/${SHOP.whatsapp}?text=${encodeURIComponent(text)}`;
      };

      function boot() {
        $("shopName").textContent = SHOP.name; document.title = SHOP.name + " — Katalog";
        renderCats(); renderGrid(); renderBar();
        if (SHOP.founderplus && SHOP.founderplus.projectId) {
          const s = document.createElement("script"); s.src = "https://cdn.founderplus.id/funnel-tracker.js";
          s.setAttribute("data-project-id", SHOP.founderplus.projectId); s.defer = true; document.body.appendChild(s);
        }
      }
      boot();
    </script>
  </body>
</html>
