<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- TODO: ganti nama tempat usahamu -->
    <title>Menu — Warung Kopi Founder+</title>
    <meta name="description" content="Scan meja, lihat menu, pesan langsung dari HP-mu." />
    <meta name="theme-color" content="#faf9fb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#141019" media="(prefers-color-scheme: dark)" />
    <style>
      /* ─────────────────────────────────────────────────────────────
         Layout grounded in real food-ordering apps (Keeta, Gojek,
         talabat, DoorDash, sweetgreen) via Mobbin: image-led item rows
         with the add/stepper control anchored to the thumbnail, a sticky
         category rail, and a persistent cart bar. Motion follows
         emil-design-eng (strong custom easings, sub-300ms UI,
         transform/opacity only); materials + type follow apple-design.
         ───────────────────────────────────────────────────────────── */
      :root {
        --brand: #8b5cf6;
        --brand-ink: #6d28d9;
        --brand-soft: color-mix(in srgb, var(--brand) 12%, transparent);
        --ink: #1a1420;
        --secondary: #524b5e;
        --muted: #857e91;
        --line: #ece8f1;
        --bg: #faf9fb;
        --card: #ffffff;
        --ok: #17984e;
        --ok-ink: #0f7a3d;
        --danger: #c2410c;

        --r-card: 18px;
        --r-ctl: 12px;

        --shadow-card: 0 1px 2px rgba(26, 20, 32, 0.04), 0 4px 14px rgba(26, 20, 32, 0.05);
        --shadow-ctl: 0 2px 8px rgba(26, 20, 32, 0.14), 0 0 0 1px rgba(26, 20, 32, 0.04);
        --shadow-pop: 0 1px 1px rgba(26, 20, 32, 0.05), 0 -8px 40px rgba(26, 20, 32, 0.14);

        --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
        --ease-drawer: cubic-bezier(0.32, 0.72, 0, 1);

        --safe-b: env(safe-area-inset-bottom, 0px);
        --safe-t: env(safe-area-inset-top, 0px);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --ink: #f4eefc; --secondary: #b8b0c6; --muted: #8b8399;
          --line: #2a2436; --bg: #131019; --card: #1c1626;
          --brand: #a78bfa; --brand-ink: #c4b5fd;
          --shadow-card: 0 1px 2px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.35);
          --shadow-ctl: 0 3px 10px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06);
          --shadow-pop: 0 1px 1px rgba(0,0,0,0.4), 0 -8px 44px rgba(0,0,0,0.55);
        }
      }

      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body { margin: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        font-optical-sizing: auto;
        color: var(--ink);
        background: var(--bg);
        line-height: 1.5;
        padding-bottom: calc(104px + var(--safe-b));
        -webkit-font-smoothing: antialiased;
      }

      /* ── Chrome: translucent material, scroll-edge hairline ── */
      header {
        position: sticky; top: 0; z-index: 5;
        padding: calc(14px + var(--safe-t)) 18px 13px;
        background: color-mix(in srgb, var(--card) 72%, transparent);
        backdrop-filter: saturate(1.8) blur(20px);
        -webkit-backdrop-filter: saturate(1.8) blur(20px);
        box-shadow: 0 1px 0 color-mix(in srgb, var(--line) 60%, transparent);
      }
      .store { font-size: 19px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; }
      .table-pill {
        display: inline-flex; align-items: center; gap: 6px;
        margin-top: 6px; font-size: 12.5px; font-weight: 650; letter-spacing: 0.01em;
        color: var(--brand-ink); background: var(--brand-soft);
        padding: 4px 11px; border-radius: 999px;
      }
      .table-pill svg { width: 13px; height: 13px; }

      main { max-width: 560px; margin: 0 auto; padding: 4px 14px 24px; }

      /* ── Category rail ── */
      .cats {
        position: sticky; top: calc(58px + var(--safe-t)); z-index: 4;
        display: flex; gap: 8px; overflow-x: auto; padding: 12px 0 10px;
        scrollbar-width: none; background: linear-gradient(var(--bg) 62%, transparent);
      }
      .cats::-webkit-scrollbar { display: none; }
      .cats button {
        flex: 0 0 auto; border: none; cursor: pointer;
        background: var(--card); color: var(--secondary);
        font: inherit; font-weight: 600; font-size: 13.5px;
        padding: 8px 15px; border-radius: 999px; white-space: nowrap;
        box-shadow: inset 0 0 0 1px var(--line);
        transition: color 180ms var(--ease-out), box-shadow 180ms var(--ease-out),
                    background 180ms var(--ease-out), transform 140ms var(--ease-out);
      }
      .cats button:active { transform: scale(0.96); }
      .cats button[aria-current="true"] {
        background: var(--ink); color: var(--card); box-shadow: inset 0 0 0 1px var(--ink);
      }

      h2.cat {
        font-size: 12px; font-weight: 700; text-transform: uppercase;
        letter-spacing: 0.07em; color: var(--muted); margin: 26px 4px 10px;
      }

      /* ── Item row: text left, image-led media right (control anchored to it) ── */
      .item {
        display: flex; gap: 14px; align-items: stretch;
        background: var(--card); border-radius: var(--r-card);
        padding: 14px 15px; margin-bottom: 11px;
        box-shadow: var(--shadow-card);
        opacity: 0; transform: translateY(10px);
        animation: item-in 460ms var(--ease-out) forwards;
      }
      @keyframes item-in { to { opacity: 1; transform: none; } }
      .item.out { box-shadow: none; background: color-mix(in srgb, var(--card) 55%, var(--bg)); }
      .item.out .name, .item.out .price { color: var(--muted); }
      .item.out .thumb, .item.out .thumb-ph { filter: grayscale(0.7); opacity: 0.75; }

      .item .body { flex: 1; min-width: 0; display: flex; flex-direction: column; }
      .item .name { font-weight: 640; font-size: 15.5px; letter-spacing: -0.01em; }
      .item .desc {
        font-size: 13px; color: var(--muted); margin-top: 3px; line-height: 1.45;
        display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      }
      .item .price { font-weight: 700; font-size: 15px; margin-top: auto; padding-top: 9px; letter-spacing: -0.01em; }

      /* Media column: 92px thumb; control floats centered on its bottom edge. */
      .media { position: relative; flex: 0 0 92px; width: 92px; align-self: center; }
      .thumb, .thumb-ph {
        width: 92px; height: 92px; border-radius: 14px; object-fit: cover; display: block;
      }
      .thumb-ph { display: grid; place-items: center; color: color-mix(in srgb, var(--ink) 30%, transparent); }
      .thumb-ph svg { width: 40px; height: 40px; }
      .control {
        position: absolute; left: 50%; bottom: -13px; transform: translateX(-50%);
      }
      .add {
        display: inline-flex; align-items: center; justify-content: center; gap: 4px;
        min-width: 78px; height: 34px; padding: 0 14px; border: none; cursor: pointer;
        background: var(--card); color: var(--brand-ink); font: inherit; font-weight: 700; font-size: 14px;
        border-radius: 999px; box-shadow: var(--shadow-ctl); white-space: nowrap;
        transition: transform 150ms var(--ease-out), color 160ms var(--ease-out);
      }
      .add:active { transform: translateX(0) scale(0.94); }
      .stepper {
        display: inline-flex; align-items: center; gap: 2px; height: 34px; padding: 0 4px;
        background: var(--card); border-radius: 999px; box-shadow: var(--shadow-ctl);
      }
      .step {
        width: 30px; height: 30px; border: none; cursor: pointer; background: transparent;
        color: var(--brand-ink); font: inherit; font-size: 19px; line-height: 1; border-radius: 999px;
        display: grid; place-items: center;
        transition: transform 150ms var(--ease-out), background 150ms var(--ease-out);
      }
      .step:active { transform: scale(0.86); }
      .qty { min-width: 20px; text-align: center; font-weight: 700; font-size: 14.5px; font-variant-numeric: tabular-nums; }
      .badge-out {
        position: absolute; left: 50%; bottom: -11px; transform: translateX(-50%);
        background: var(--card); color: var(--danger); font-size: 11.5px; font-weight: 700;
        padding: 4px 11px; border-radius: 999px; box-shadow: var(--shadow-ctl); white-space: nowrap;
      }

      @media (hover: hover) and (pointer: fine) {
        .add:hover { color: var(--brand); }
        .step:hover { background: var(--brand-soft); }
        .cats button:hover:not([aria-current="true"]) { color: var(--ink); }
      }

      /* ── Floating cart bar ── */
      .cartbar {
        position: fixed; left: 0; right: 0; bottom: 0; z-index: 10;
        padding: 12px 14px calc(12px + var(--safe-b));
        background: color-mix(in srgb, var(--card) 78%, transparent);
        backdrop-filter: saturate(1.8) blur(20px); -webkit-backdrop-filter: saturate(1.8) blur(20px);
        box-shadow: 0 -1px 0 color-mix(in srgb, var(--line) 70%, transparent);
        transform: translateY(140%); transition: transform 420ms var(--ease-drawer);
      }
      .cartbar.show { transform: translateY(0); }
      .cartbar .go {
        width: 100%; max-width: 560px; margin: 0 auto; cursor: pointer; border: none;
        display: flex; align-items: center; justify-content: space-between; gap: 12px;
        background: var(--ink); color: var(--card);
        padding: 15px 18px; border-radius: 15px; font: inherit; font-size: 16px; font-weight: 650;
        box-shadow: 0 4px 16px rgba(26, 20, 32, 0.18);
        transition: transform 150ms var(--ease-out);
      }
      .cartbar .go:active { transform: scale(0.985); }
      .cartbar .go .left { display: inline-flex; align-items: center; gap: 10px; }
      .count {
        min-width: 22px; height: 22px; padding: 0 7px; border-radius: 999px;
        display: inline-flex; align-items: center; justify-content: center;
        background: color-mix(in srgb, var(--card) 22%, transparent);
        font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums;
      }
      .cartbar .total { letter-spacing: -0.01em; }

      /* ── Order sheet: iOS-like slide-up drawer (native <dialog>) ── */
      dialog#sheet {
        border: none; padding: 0; width: 100%; max-width: 560px;
        margin: auto auto 0; border-radius: 24px 24px 0 0;
        background: var(--card); color: var(--ink); box-shadow: var(--shadow-pop);
        max-height: 88vh;
        transform: translateY(100%);
        transition: transform 440ms var(--ease-drawer), overlay 440ms allow-discrete, display 440ms allow-discrete;
      }
      dialog#sheet[open] { transform: translateY(0); }
      @starting-style { dialog#sheet[open] { transform: translateY(100%); } }
      dialog#sheet::backdrop {
        background: rgba(16, 10, 26, 0); backdrop-filter: blur(0px);
        transition: background 440ms var(--ease-out), backdrop-filter 440ms var(--ease-out),
                    overlay 440ms allow-discrete, display 440ms allow-discrete;
      }
      dialog#sheet[open]::backdrop { background: rgba(16, 10, 26, 0.5); backdrop-filter: blur(2px); }
      @starting-style { dialog#sheet[open]::backdrop { background: rgba(16, 10, 26, 0); backdrop-filter: blur(0px); } }

      .grabber { width: 38px; height: 5px; border-radius: 3px; background: var(--line); margin: 10px auto 0; }
      .sheet-in { padding: 12px 18px calc(20px + var(--safe-b)); overflow-y: auto; }
      .sheet-in h3 { margin: 6px 0 6px; font-size: 18px; letter-spacing: -0.015em; font-weight: 700; }

      /* Cart line: thumbnail + name + in-place stepper + line price (Nike/Magnolia pattern) */
      .cline { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--line); }
      .cline:last-of-type { border-bottom: none; }
      .cline .cthumb, .cline .cthumb-ph {
        width: 46px; height: 46px; border-radius: 11px; object-fit: cover; flex: 0 0 46px;
        display: grid; place-items: center;
      }
      .cline .cthumb-ph { color: color-mix(in srgb, var(--ink) 32%, transparent); }
      .cline .cthumb-ph svg { width: 22px; height: 22px; }
      .cline .cinfo { flex: 1; min-width: 0; }
      .cline .cname { font-weight: 600; font-size: 14.5px; letter-spacing: -0.01em;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .cline .cprice { font-size: 12.5px; color: var(--muted); margin-top: 2px; font-variant-numeric: tabular-nums; }
      .cline .cstep { display: inline-flex; align-items: center; gap: 2px; flex: 0 0 auto;
        background: var(--bg); border-radius: 999px; padding: 0 3px; box-shadow: inset 0 0 0 1px var(--line); }
      .cline .cstep button { width: 28px; height: 28px; border: none; background: transparent; cursor: pointer;
        color: var(--brand-ink); font-size: 17px; line-height: 1; border-radius: 999px;
        transition: transform 150ms var(--ease-out); }
      .cline .cstep button:active { transform: scale(0.86); }
      .cline .cstep .cq { min-width: 18px; text-align: center; font-weight: 700; font-size: 14px; font-variant-numeric: tabular-nums; }

      .total-row { display: flex; justify-content: space-between; align-items: baseline;
        font-weight: 800; font-size: 19px; letter-spacing: -0.02em; margin: 16px 0 4px; }
      .total-row span:last-child { font-variant-numeric: tabular-nums; }
      textarea, input {
        width: 100%; border: none; box-shadow: inset 0 0 0 1px var(--line);
        border-radius: var(--r-ctl); padding: 12px 13px; font: inherit; margin-top: 10px;
        background: var(--bg); color: var(--ink); transition: box-shadow 160ms var(--ease-out);
      }
      textarea:focus, input:focus { outline: none; box-shadow: inset 0 0 0 2px var(--brand); }
      textarea { resize: none; }
      .send {
        width: 100%; background: var(--ok); color: #fff; border: none; margin-top: 14px;
        padding: 15px; border-radius: 15px; font: inherit; font-size: 16px; font-weight: 700; cursor: pointer;
        box-shadow: 0 4px 16px color-mix(in srgb, var(--ok) 34%, transparent);
        transition: transform 150ms var(--ease-out), background 180ms var(--ease-out), opacity 180ms var(--ease-out);
      }
      .send:active { transform: scale(0.985); }
      .send[disabled] { opacity: 0.45; box-shadow: none; }
      @media (hover: hover) and (pointer: fine) { .send:hover:not([disabled]) { background: var(--ok-ink); } }
      .close { position: absolute; top: 14px; right: 16px; width: 30px; height: 30px;
        display: grid; place-items: center; border: none; border-radius: 999px;
        background: var(--bg); color: var(--muted); font-size: 16px; line-height: 1; cursor: pointer;
        transition: transform 150ms var(--ease-out); }
      .close:active { transform: scale(0.9); }
      .empty { text-align: center; color: var(--muted); padding: 32px 20px; font-size: 15px; }

      .banner-warn { background: color-mix(in srgb, var(--danger) 8%, var(--card));
        color: var(--danger); box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--danger) 22%, transparent);
        border-radius: var(--r-ctl); padding: 11px 13px; font-size: 13px; margin: 10px 0 2px; }
      footer { text-align: center; color: var(--muted); font-size: 12.5px; padding: 28px 0 8px; }
      footer a { color: var(--brand-ink); text-decoration: none; font-weight: 600; }

      @media (prefers-reduced-motion: reduce) {
        .item { animation: item-fade 260ms ease forwards; transform: none; }
        @keyframes item-fade { to { opacity: 1; } }
        .cartbar { transition: opacity 240ms ease; }
        dialog#sheet, dialog#sheet::backdrop { transition: opacity 220ms ease; transform: none !important; }
        .add:active, .step:active, .go:active, .send:active, .cats button:active, .close:active,
        .cline .cstep button:active { transform: none; }
      }
    </style>
  </head>
  <body>
    <!--
      ═══════════════════════════════════════════════════════════════════
      KONFIGURASI — edit blok CONFIG + MENU di bawah. Tanpa build step.
      Pelanggan buka:  https://tokomu.host.founderplus.id/?meja=A1
      QR per meja dibuat di tables.html (buka di browser, print).
      ═══════════════════════════════════════════════════════════════════
    -->
    <header>
      <div class="store" id="storeName">Warung Kopi Founder+</div>
      <span class="table-pill" id="tablePill" hidden><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg> Meja <span id="tableId"></span></span>
    </header>

    <main>
      <div id="tableWarn" class="banner-warn" hidden>
        Nomor meja tidak terbaca dari QR. Kamu masih bisa memesan — sebutkan nomor mejamu ke kasir, atau scan ulang QR di meja.
      </div>
      <nav class="cats" id="cats" aria-label="Kategori"></nav>
      <div id="menu"></div>
      <footer>
        Ditenagai <a href="https://founderplus.id" target="_blank" rel="noopener">Founder+</a> · Pesanan aman
      </footer>
    </main>

    <div class="cartbar" id="cartbar">
      <button type="button" class="go" id="openSheet">
        <span class="left">Lihat pesanan <span class="count" id="cartCount">0</span></span>
        <span class="total" id="cartTotal">Rp 0</span>
      </button>
    </div>

    <dialog id="sheet">
      <div class="grabber" aria-hidden="true"></div>
      <button class="close" id="closeSheet" aria-label="Tutup">✕</button>
      <div class="sheet-in">
        <h3>Pesanan · <span id="sheetTable">—</span></h3>
        <div id="orderLines"></div>
        <div class="total-row"><span>Total</span><span id="sheetTotal">Rp 0</span></div>
        <input id="custName" type="text" inputmode="text" placeholder="Nama (opsional)" autocomplete="name" />
        <textarea id="note" rows="2" placeholder="Catatan buat dapur (opsional) — mis. es sedikit, pedas"></textarea>
        <button class="send" id="sendOrder">Kirim pesanan</button>
      </div>
    </dialog>

    <script>
      // ══════════════════════════ CONFIG ══════════════════════════
      const CONFIG = {
        storeName: "Warung Kopi Founder+",
        currency: "IDR",
        // Nomor WhatsApp kasir/dapur (format internasional tanpa +, mis. 62812xxxx).
        // Jalur pesanan default yang LANGSUNG BEKERJA tanpa backend.
        whatsapp: "6281234567890",
        // (Opsional) Endpoint POS Founder+. Kalau diisi, pesanan dikirim ke
        // backend POS dulu; WhatsApp jadi fallback. Biarkan null sampai
        // endpoint tersedia. Lihat SETUP.md → "Sambungkan ke POS Founder+".
        posApi: null, // mis. "https://api.founderplus.id/creator/pos/orders"
        // Param URL yang dipakai untuk nomor meja (dukung beberapa alias).
        tableParams: ["meja", "table", "t"],
        // Ikon placeholder per kategori (dipakai kalau item belum punya foto).
        // Nilai = key dari ICONS: "coffee" | "cup" | "food".
        categoryIcon: { Kopi: "coffee", "Non-Kopi": "cup", Makanan: "food" },
      };

      // Ikon line monokrom (currentColor) untuk placeholder — bukan emoji.
      const ICONS = {
        coffee: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2v2M14 2v2M6 2v2"/><path d="M16 8a1 1 0 0 1 1 1v8a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V9a1 1 0 0 1 1-1h14a4 4 0 1 1 0 8h-1"/></svg>`,
        cup: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3h14l-1.3 15.2a2 2 0 0 1-2 1.8H8.3a2 2 0 0 1-2-1.8L5 3Z"/><path d="M5.6 9h12.8"/></svg>`,
        food: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>`,
        photo: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.1-3.1a2 2 0 0 0-2.8 0L6 21"/></svg>`,
      };

      // ══════════════════════════ MENU ══════════════════════════
      // Satu sumber kebenaran menu. price = angka rupiah (tanpa titik/koma).
      //   available:false → sold out.   category → grup tampilan.
      //   image:"https://…/foto.jpg" (opsional) → foto produk. Kalau kosong,
      //   tampil placeholder gradient + ikon (kategori, atau field `icon`).
      const MENU = [
        { id: "kopi-susu", name: "Kopi Susu Gula Aren", desc: "Espresso, susu segar, gula aren cair", price: 22000, category: "Kopi", available: true },
        { id: "americano", name: "Americano", desc: "Double shot, air, tanpa gula", price: 18000, category: "Kopi", available: true },
        { id: "latte", name: "Cafe Latte", desc: "Espresso + steamed milk", price: 25000, category: "Kopi", available: true },
        { id: "matcha", name: "Matcha Latte", desc: "Matcha premium, susu", price: 27000, category: "Non-Kopi", available: true },
        { id: "coklat", name: "Coklat Panas", desc: "Dark chocolate, susu", price: 24000, category: "Non-Kopi", available: false },
        { id: "croissant", name: "Butter Croissant", desc: "Panggang, mentega Prancis", price: 20000, category: "Makanan", available: true },
        { id: "nasi-ayam", name: "Nasi Ayam Sambal Matah", desc: "Ayam goreng, sambal matah, nasi hangat", price: 32000, category: "Makanan", available: true },
      ];
      // ═════════════════════════════════════════════════════════════

      const fmt = (n) =>
        CONFIG.currency === "IDR"
          ? "Rp " + Number(n || 0).toLocaleString("id-ID")
          : Number(n || 0).toLocaleString("en-US", { style: "currency", currency: CONFIG.currency });

      function readTable() {
        const q = new URLSearchParams(location.search);
        for (const key of CONFIG.tableParams) {
          const raw = q.get(key);
          if (raw) return raw.trim().slice(0, 24).replace(/[^\w\- ]/g, "");
        }
        return "";
      }

      const TABLE = readTable();
      const cart = new Map(); // id -> qty
      const itemById = (id) => MENU.find((m) => m.id === id);
      const iconFor = (it) => ICONS[it.icon || CONFIG.categoryIcon[it.category]] || ICONS.food;

      // Deterministic soft gradient from the item id — a tasteful placeholder so
      // the menu looks intentional out of the box (owners add real photos later).
      function placeholderBg(id) {
        let h = 0;
        for (let i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) % 360;
        return `linear-gradient(135deg, hsl(${h} 52% 90%), hsl(${(h + 42) % 360} 56% 82%))`;
      }
      // Dark-mode placeholder: deeper, still tinted.
      function placeholderBgDark(id) {
        let h = 0;
        for (let i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) % 360;
        return `linear-gradient(135deg, hsl(${h} 32% 26%), hsl(${(h + 42) % 360} 34% 20%))`;
      }
      const isDark = () => matchMedia("(prefers-color-scheme: dark)").matches;
      const phStyle = (id) => `background:${isDark() ? placeholderBgDark(id) : placeholderBg(id)}`;

      function money() {
        let total = 0, count = 0;
        for (const [id, qty] of cart) {
          const it = itemById(id);
          if (it) { total += it.price * qty; count += qty; }
        }
        return { total, count };
      }

      function renderHeader() {
        document.getElementById("storeName").textContent = CONFIG.storeName;
        document.title = "Menu — " + CONFIG.storeName;
        if (TABLE) {
          document.getElementById("tableId").textContent = TABLE;
          document.getElementById("tablePill").hidden = false;
          document.getElementById("sheetTable").textContent = "Meja " + TABLE;
        } else {
          document.getElementById("tableWarn").hidden = false;
          document.getElementById("sheetTable").textContent = "Tanpa meja";
        }
      }

      const categories = () => [...new Set(MENU.map((m) => m.category))];

      function renderCats() {
        const nav = document.getElementById("cats");
        nav.innerHTML = "";
        categories().forEach((cat, i) => {
          const b = document.createElement("button");
          b.textContent = cat;
          b.type = "button";
          if (i === 0) b.setAttribute("aria-current", "true");
          b.onclick = () => {
            nav.querySelectorAll("button").forEach((x) => x.removeAttribute("aria-current"));
            b.setAttribute("aria-current", "true");
            document.getElementById("cat-" + i).scrollIntoView({ behavior: "smooth", block: "start" });
          };
          nav.appendChild(b);
        });
      }

      // Build the menu ONCE. Qty changes patch only the affected control cluster
      // (no full rebuild) so the entrance stagger never replays and it stays cheap.
      function renderMenu() {
        const root = document.getElementById("menu");
        root.innerHTML = "";
        let idx = 0;
        categories().forEach((cat, i) => {
          const h = document.createElement("h2");
          h.className = "cat"; h.id = "cat-" + i; h.textContent = cat;
          root.appendChild(h);
          MENU.filter((m) => m.category === cat).forEach((it) => root.appendChild(itemEl(it, idx++)));
        });
      }

      function thumbHtml(it) {
        if (it.image) return `<img class="thumb" src="${escapeAttr(it.image)}" alt="" loading="lazy" />`;
        return `<div class="thumb-ph" style="${phStyle(it.id)}" aria-hidden="true">${iconFor(it)}</div>`;
      }

      function itemEl(it, idx) {
        const el = document.createElement("article");
        el.className = "item" + (it.available ? "" : " out");
        el.style.animationDelay = Math.min(idx * 45, 360) + "ms";
        el.innerHTML = `
          <div class="body">
            <div class="name">${escapeHtml(it.name)}</div>
            ${it.desc ? `<div class="desc">${escapeHtml(it.desc)}</div>` : ""}
            <div class="price">${fmt(it.price)}</div>
          </div>
          <div class="media">
            ${thumbHtml(it)}
            <div class="control" data-control="${it.id}">
              ${it.available ? controlHtml(it.id) : `<div class="badge-out">Habis</div>`}
            </div>
          </div>`;
        return el;
      }

      // The add button (qty 0) becomes an inline stepper (qty > 0), anchored to the thumbnail.
      function controlHtml(id) {
        const qty = cart.get(id) || 0;
        if (qty <= 0) {
          return `<button class="add" type="button" data-add="${id}">+ Tambah</button>`;
        }
        return `<div class="stepper">
            <button class="step" type="button" data-dec="${id}" aria-label="Kurangi">−</button>
            <span class="qty">${qty}</span>
            <button class="step" type="button" data-inc="${id}" aria-label="Tambah">+</button>
          </div>`;
      }

      function patchControl(id) {
        const slot = document.querySelector(`[data-control="${id}"]`);
        if (slot) slot.innerHTML = controlHtml(id);
      }

      function setQty(id, qty) {
        if (qty <= 0) cart.delete(id);
        else cart.set(id, qty);
        patchControl(id);
        renderCartBar();
        // If the sheet is open, keep it in sync (edit-in-place from the menu too).
        if (document.getElementById("sheet").open) renderSheet();
      }

      function renderCartBar() {
        const { total, count } = money();
        document.getElementById("cartCount").textContent = count;
        document.getElementById("cartTotal").textContent = fmt(total);
        document.getElementById("cartbar").classList.toggle("show", count > 0);
      }

      function cthumbHtml(it) {
        if (it.image) return `<img class="cthumb" src="${escapeAttr(it.image)}" alt="" />`;
        return `<div class="cthumb-ph" style="${phStyle(it.id)}" aria-hidden="true">${iconFor(it)}</div>`;
      }

      function renderSheet() {
        const wrap = document.getElementById("orderLines");
        wrap.innerHTML = "";
        if (cart.size === 0) {
          wrap.innerHTML = `<div class="empty">Belum ada pesanan.</div>`;
        } else {
          for (const [id, qty] of cart) {
            const it = itemById(id);
            if (!it) continue;
            const row = document.createElement("div");
            row.className = "cline";
            row.innerHTML = `
              ${cthumbHtml(it)}
              <div class="cinfo">
                <div class="cname">${escapeHtml(it.name)}</div>
                <div class="cprice">${fmt(it.price)} · ${fmt(it.price * qty)}</div>
              </div>
              <div class="cstep">
                <button type="button" data-cdec="${id}" aria-label="Kurangi">−</button>
                <span class="cq">${qty}</span>
                <button type="button" data-cinc="${id}" aria-label="Tambah">+</button>
              </div>`;
            wrap.appendChild(row);
          }
        }
        document.getElementById("sheetTotal").textContent = fmt(money().total);
        document.getElementById("sendOrder").disabled = cart.size === 0;
      }

      function orderSummary() {
        const lines = [];
        for (const [id, qty] of cart) {
          const it = itemById(id);
          if (it) lines.push({ id, name: it.name, qty, price: it.price, subtotal: it.price * qty });
        }
        return { table: TABLE || null, items: lines, total: money().total };
      }

      async function submitOrder() {
        const name = document.getElementById("custName").value.trim();
        const note = document.getElementById("note").value.trim();
        const order = { ...orderSummary(), customer: name || null, note: note || null };
        if (order.items.length === 0) return;

        // Preferred path: Founder+ POS backend (when configured). Falls back to
        // WhatsApp on any failure so a table order is NEVER silently lost.
        if (CONFIG.posApi) {
          try {
            const res = await fetch(CONFIG.posApi, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(order),
            });
            if (res.ok) { orderDone(); return; }
          } catch (_) { /* fall through to WhatsApp */ }
        }
        openWhatsApp(order);
        orderDone();
      }

      function openWhatsApp(order) {
        const head = `Halo ${CONFIG.storeName}! Pesanan${order.table ? " Meja " + order.table : ""}:`;
        const body = order.items.map((i) => `• ${i.qty}× ${i.name} — ${fmt(i.subtotal)}`).join("\n");
        const foot = `\nTotal: ${fmt(order.total)}` +
          (order.customer ? `\nNama: ${order.customer}` : "") +
          (order.note ? `\nCatatan: ${order.note}` : "");
        const text = encodeURIComponent(`${head}\n${body}${foot}`);
        location.href = `https://wa.me/${CONFIG.whatsapp}?text=${text}`;
      }

      function orderDone() {
        cart.clear();
        document.querySelectorAll("[data-control]").forEach((slot) => {
          const id = slot.getAttribute("data-control");
          const it = itemById(id);
          if (it && it.available) slot.innerHTML = controlHtml(id);
        });
        renderCartBar();
        document.getElementById("sheet").close();
      }

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, (ch) =>
          ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
      }
      const escapeAttr = escapeHtml;

      // Menu: add / stepper.
      document.getElementById("menu").addEventListener("click", (e) => {
        const t = e.target.closest("button");
        if (!t) return;
        if (t.dataset.add) setQty(t.dataset.add, 1);
        else if (t.dataset.inc) setQty(t.dataset.inc, (cart.get(t.dataset.inc) || 0) + 1);
        else if (t.dataset.dec) setQty(t.dataset.dec, (cart.get(t.dataset.dec) || 0) - 1);
      });

      // Sheet: in-place quantity editing.
      document.getElementById("orderLines").addEventListener("click", (e) => {
        const t = e.target.closest("button");
        if (!t) return;
        if (t.dataset.cinc) setQty(t.dataset.cinc, (cart.get(t.dataset.cinc) || 0) + 1);
        else if (t.dataset.cdec) setQty(t.dataset.cdec, (cart.get(t.dataset.cdec) || 0) - 1);
      });

      const sheet = document.getElementById("sheet");
      document.getElementById("openSheet").onclick = () => { renderSheet(); sheet.showModal(); };
      document.getElementById("closeSheet").onclick = () => sheet.close();
      sheet.addEventListener("click", (e) => { if (e.target === sheet) sheet.close(); });
      document.getElementById("sendOrder").onclick = submitOrder;

      renderHeader();
      renderCats();
      renderMenu();
      renderCartBar();
    </script>
  </body>
</html>
