<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- TODO: ganti nama tempat usahamu -->
    <title>Menu — Warung Kopi Founder+</title>
    <meta name="description" content="Scan meja, lihat menu, pesan langsung dari HP-mu." />
    <meta name="theme-color" content="#8b5cf6" />
    <style>
      :root {
        --brand: #8b5cf6;
        --brand-ink: #6d28d9;
        --ink: #1c1523;
        --muted: #6b6577;
        --line: #ece9f1;
        --bg: #faf9fb;
        --card: #ffffff;
        --ok: #16a34a;
        --radius: 16px;
        --safe-b: env(safe-area-inset-bottom, 0px);
      }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body { margin: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        color: var(--ink);
        background: var(--bg);
        line-height: 1.5;
        /* room for the floating cart bar */
        padding-bottom: calc(96px + var(--safe-b));
      }
      header {
        position: sticky; top: 0; z-index: 5;
        background: color-mix(in srgb, var(--card) 88%, transparent);
        backdrop-filter: saturate(1.4) blur(12px);
        -webkit-backdrop-filter: saturate(1.4) blur(12px);
        border-bottom: 1px solid var(--line);
        padding: 14px 18px calc(12px);
      }
      .store { font-weight: 700; font-size: 17px; letter-spacing: -0.01em; }
      .table-pill {
        display: inline-flex; align-items: center; gap: 6px;
        margin-top: 4px; font-size: 13px; color: var(--brand-ink);
        background: color-mix(in srgb, var(--brand) 12%, transparent);
        padding: 3px 10px; border-radius: 999px; font-weight: 600;
      }
      main { max-width: 560px; margin: 0 auto; padding: 8px 14px 24px; }
      .cats {
        position: sticky; top: 64px; z-index: 4;
        display: flex; gap: 8px; overflow-x: auto; padding: 10px 0;
        scrollbar-width: none; background: linear-gradient(var(--bg), var(--bg) 70%, transparent);
      }
      .cats::-webkit-scrollbar { display: none; }
      .cats button {
        flex: 0 0 auto; border: 1px solid var(--line); background: var(--card);
        color: var(--muted); font-weight: 600; font-size: 13px;
        padding: 7px 14px; border-radius: 999px; cursor: pointer; white-space: nowrap;
      }
      .cats button[aria-current="true"] { background: var(--ink); color: #fff; border-color: var(--ink); }
      h2.cat { font-size: 14px; text-transform: uppercase; letter-spacing: 0.06em;
        color: var(--muted); margin: 22px 2px 8px; }
      .item {
        display: flex; gap: 12px; align-items: flex-start;
        background: var(--card); border: 1px solid var(--line);
        border-radius: var(--radius); padding: 14px; margin-bottom: 10px;
      }
      .item.out { opacity: 0.55; }
      .item .body { flex: 1; min-width: 0; }
      .item .name { font-weight: 650; }
      .item .desc { font-size: 13px; color: var(--muted); margin-top: 2px; }
      .item .price { font-weight: 700; margin-top: 8px; }
      .item .thumb {
        width: 68px; height: 68px; border-radius: 12px; object-fit: cover;
        background: color-mix(in srgb, var(--brand) 10%, #eee); flex: 0 0 auto;
      }
      .stepper { display: inline-flex; align-items: center; gap: 0; margin-top: 10px; }
      .stepper button {
        width: 34px; height: 34px; border: 1px solid var(--line); background: var(--card);
        font-size: 18px; line-height: 1; border-radius: 10px; cursor: pointer; color: var(--brand-ink);
      }
      .stepper .add {
        width: auto; border: none; background: var(--brand); color: #fff; font-weight: 650;
        padding: 0 18px; height: 34px; border-radius: 10px; font-size: 14px; white-space: nowrap;
      }
      .stepper .qty { min-width: 34px; text-align: center; font-weight: 700; font-variant-numeric: tabular-nums; }
      .stepper .g { display: inline-flex; gap: 8px; align-items: center; }
      .soldout { font-size: 12px; color: #b91c1c; font-weight: 600; margin-top: 8px; }
      /* Floating cart bar */
      .cartbar {
        position: fixed; left: 0; right: 0; bottom: 0; z-index: 10;
        padding: 12px 14px calc(12px + var(--safe-b));
        background: color-mix(in srgb, var(--card) 92%, transparent);
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        border-top: 1px solid var(--line);
        transform: translateY(120%); transition: transform .28s cubic-bezier(.2,.8,.2,1);
      }
      .cartbar.show { transform: translateY(0); }
      .cartbar button {
        width: 100%; max-width: 560px; margin: 0 auto; display: flex;
        align-items: center; justify-content: space-between; gap: 12px;
        background: var(--ink); color: #fff; border: none;
        padding: 15px 20px; border-radius: 14px; font-size: 16px; font-weight: 650; cursor: pointer;
      }
      .cartbar .count {
        background: rgba(255,255,255,.18); border-radius: 999px; padding: 1px 9px;
        font-size: 13px; font-variant-numeric: tabular-nums;
      }
      /* Order sheet */
      dialog#sheet {
        border: none; border-radius: 22px 22px 0 0; padding: 0; width: 100%;
        max-width: 560px; margin: auto auto 0; background: var(--card);
        box-shadow: 0 -10px 40px rgba(20,10,40,.18);
      }
      dialog#sheet::backdrop { background: rgba(20,12,30,.45); }
      .sheet-in { padding: 20px 18px calc(20px + var(--safe-b)); }
      .sheet-in h3 { margin: 4px 0 14px; font-size: 18px; }
      .line { display: flex; justify-content: space-between; gap: 12px; padding: 9px 0; border-bottom: 1px dashed var(--line); font-size: 15px; }
      .line .n { color: var(--muted); }
      .total { display: flex; justify-content: space-between; font-weight: 800; font-size: 18px; margin: 14px 0 6px; }
      textarea, input {
        width: 100%; border: 1px solid var(--line); border-radius: 12px;
        padding: 12px; font: inherit; margin-top: 10px; background: #fff; color: var(--ink);
      }
      .send {
        width: 100%; background: var(--ok); color: #fff; border: none; margin-top: 14px;
        padding: 15px; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer;
      }
      .send[disabled] { opacity: .5; }
      .close { position: absolute; top: 12px; right: 14px; background: none; border: none;
        font-size: 26px; color: var(--muted); cursor: pointer; line-height: 1; }
      .empty { text-align: center; color: var(--muted); padding: 60px 20px; }
      .banner-warn { background: #fff7ed; color: #9a3412; border: 1px solid #fed7aa;
        border-radius: 12px; padding: 10px 12px; font-size: 13px; margin: 8px 0 4px; }
      footer { text-align: center; color: var(--muted); font-size: 12px; padding: 24px 0 8px; }
      footer a { color: var(--brand-ink); text-decoration: none; }
      @media (prefers-color-scheme: dark) {
        :root { --ink:#f3eefb; --muted:#a79fb5; --line:#2a2435; --bg:#141019; --card:#1d1726; }
      }
    </style>
  </head>
  <body>
    <!--
      ═══════════════════════════════════════════════════════════════════
      KONFIGURASI — edit blok CONFIG + MENU di bawah. Tanpa build step.
      Pelanggan buka:  https://tokomu.host.founderplus.id/?meja=A1
      QR per meja dibuat di tables.html (buka di browser, print).
      ═══════════════════════════════════════════════════════════════════
    -->
    <header>
      <div class="store" id="storeName">Warung Kopi Founder+</div>
      <span class="table-pill" id="tablePill" hidden>🍽️ Meja <span id="tableId"></span></span>
    </header>

    <main>
      <div id="tableWarn" class="banner-warn" hidden>
        Nomor meja tidak terbaca dari QR. Kamu masih bisa memesan — sebutkan nomor mejamu ke kasir, atau scan ulang QR di meja.
      </div>
      <nav class="cats" id="cats" aria-label="Kategori"></nav>
      <div id="menu"></div>
      <footer>
        Ditenagai <a href="https://founderplus.id" target="_blank" rel="noopener">Founder+</a> · Pesanan aman
      </footer>
    </main>

    <div class="cartbar" id="cartbar">
      <button type="button" id="openSheet">
        <span>Lihat pesanan <span class="count" id="cartCount">0</span></span>
        <span id="cartTotal">Rp 0</span>
      </button>
    </div>

    <dialog id="sheet">
      <button class="close" id="closeSheet" aria-label="Tutup">×</button>
      <div class="sheet-in">
        <h3>Pesanan · <span id="sheetTable">—</span></h3>
        <div id="orderLines"></div>
        <div class="total"><span>Total</span><span id="sheetTotal">Rp 0</span></div>
        <input id="custName" type="text" inputmode="text" placeholder="Nama (opsional)" autocomplete="name" />
        <textarea id="note" rows="2" placeholder="Catatan buat dapur (opsional) — mis. es sedikit, pedas"></textarea>
        <button class="send" id="sendOrder">Kirim pesanan</button>
      </div>
    </dialog>

    <script>
      // ══════════════════════════ CONFIG ══════════════════════════
      const CONFIG = {
        storeName: "Warung Kopi Founder+",
        currency: "IDR",
        // Nomor WhatsApp kasir/dapur (format internasional tanpa +, mis. 62812xxxx).
        // Ini jalur pesanan default yang LANGSUNG BEKERJA tanpa backend.
        whatsapp: "6281234567890",
        // (Opsional) Endpoint POS Founder+. Kalau diisi, pesanan dikirim ke
        // backend POS dulu; WhatsApp jadi fallback. Biarkan null sampai
        // endpoint tersedia. Lihat SETUP.md → "Sambungkan ke POS Founder+".
        posApi: null, // mis. "https://api.founderplus.id/creator/pos/orders"
        // Param URL yang dipakai untuk nomor meja (dukung beberapa alias).
        tableParams: ["meja", "table", "t"],
      };

      // ══════════════════════════ MENU ══════════════════════════
      // Satu sumber kebenaran menu. price = angka rupiah (tanpa titik/koma).
      // Set available:false untuk sold out. category mengelompokkan tampilan.
      const MENU = [
        { id: "kopi-susu", name: "Kopi Susu Gula Aren", desc: "Espresso, susu segar, gula aren cair", price: 22000, category: "Kopi", available: true },
        { id: "americano", name: "Americano", desc: "Double shot, air, tanpa gula", price: 18000, category: "Kopi", available: true },
        { id: "latte", name: "Cafe Latte", desc: "Espresso + steamed milk", price: 25000, category: "Kopi", available: true },
        { id: "matcha", name: "Matcha Latte", desc: "Matcha premium, susu", price: 27000, category: "Non-Kopi", available: true },
        { id: "coklat", name: "Coklat Panas", desc: "Dark chocolate, susu", price: 24000, category: "Non-Kopi", available: false },
        { id: "croissant", name: "Butter Croissant", desc: "Panggang, mentega Prancis", price: 20000, category: "Makanan", available: true },
        { id: "nasi-ayam", name: "Nasi Ayam Sambal Matah", desc: "Ayam goreng, sambal matah, nasi hangat", price: 32000, category: "Makanan", available: true },
      ];
      // ═════════════════════════════════════════════════════════════

      const fmt = (n) =>
        CONFIG.currency === "IDR"
          ? "Rp " + Number(n || 0).toLocaleString("id-ID")
          : Number(n || 0).toLocaleString("en-US", { style: "currency", currency: CONFIG.currency });

      // Read table id from any configured param. Sanitized to a short, safe token.
      function readTable() {
        const q = new URLSearchParams(location.search);
        for (const key of CONFIG.tableParams) {
          const raw = q.get(key);
          if (raw) return raw.trim().slice(0, 24).replace(/[^\w\- ]/g, "");
        }
        return "";
      }

      const TABLE = readTable();
      const cart = new Map(); // id -> qty

      function money() {
        let total = 0, count = 0;
        for (const [id, qty] of cart) {
          const it = MENU.find((m) => m.id === id);
          if (it) { total += it.price * qty; count += qty; }
        }
        return { total, count };
      }

      function renderHeader() {
        document.getElementById("storeName").textContent = CONFIG.storeName;
        document.title = "Menu — " + CONFIG.storeName;
        if (TABLE) {
          document.getElementById("tableId").textContent = TABLE;
          document.getElementById("tablePill").hidden = false;
          document.getElementById("sheetTable").textContent = "Meja " + TABLE;
        } else {
          document.getElementById("tableWarn").hidden = false;
          document.getElementById("sheetTable").textContent = "Tanpa meja";
        }
      }

      function categories() {
        return [...new Set(MENU.map((m) => m.category))];
      }

      function renderCats() {
        const nav = document.getElementById("cats");
        nav.innerHTML = "";
        categories().forEach((cat, i) => {
          const b = document.createElement("button");
          b.textContent = cat;
          b.type = "button";
          if (i === 0) b.setAttribute("aria-current", "true");
          b.onclick = () => {
            nav.querySelectorAll("button").forEach((x) => x.removeAttribute("aria-current"));
            b.setAttribute("aria-current", "true");
            document.getElementById("cat-" + i).scrollIntoView({ behavior: "smooth", block: "start" });
          };
          nav.appendChild(b);
        });
      }

      function renderMenu() {
        const root = document.getElementById("menu");
        root.innerHTML = "";
        categories().forEach((cat, i) => {
          const h = document.createElement("h2");
          h.className = "cat"; h.id = "cat-" + i; h.textContent = cat;
          root.appendChild(h);
          MENU.filter((m) => m.category === cat).forEach((it) => root.appendChild(itemEl(it)));
        });
      }

      function itemEl(it) {
        const el = document.createElement("article");
        el.className = "item" + (it.available ? "" : " out");
        const qty = cart.get(it.id) || 0;
        el.innerHTML = `
          <div class="body">
            <div class="name">${escapeHtml(it.name)}</div>
            ${it.desc ? `<div class="desc">${escapeHtml(it.desc)}</div>` : ""}
            <div class="price">${fmt(it.price)}</div>
            ${it.available ? controls(it, qty) : `<div class="soldout">Habis</div>`}
          </div>`;
        return el;
      }

      function controls(it, qty) {
        if (qty <= 0) {
          return `<div class="stepper"><button class="add" type="button" data-add="${it.id}">+ Tambah</button></div>`;
        }
        return `<div class="stepper g">
            <button type="button" data-dec="${it.id}" aria-label="Kurangi">−</button>
            <span class="qty">${qty}</span>
            <button type="button" data-inc="${it.id}" aria-label="Tambah">+</button>
          </div>`;
      }

      function setQty(id, qty) {
        if (qty <= 0) cart.delete(id);
        else cart.set(id, qty);
        renderMenu();
        renderCartBar();
      }

      function renderCartBar() {
        const { total, count } = money();
        document.getElementById("cartCount").textContent = count;
        document.getElementById("cartTotal").textContent = fmt(total);
        document.getElementById("cartbar").classList.toggle("show", count > 0);
      }

      function renderSheet() {
        const wrap = document.getElementById("orderLines");
        wrap.innerHTML = "";
        if (cart.size === 0) {
          wrap.innerHTML = `<div class="empty">Belum ada pesanan.</div>`;
        } else {
          for (const [id, qty] of cart) {
            const it = MENU.find((m) => m.id === id);
            if (!it) continue;
            const row = document.createElement("div");
            row.className = "line";
            row.innerHTML = `<span><b>${qty}×</b> ${escapeHtml(it.name)}</span><span class="n">${fmt(it.price * qty)}</span>`;
            wrap.appendChild(row);
          }
        }
        const { total } = money();
        document.getElementById("sheetTotal").textContent = fmt(total);
        document.getElementById("sendOrder").disabled = cart.size === 0;
      }

      // Build a human-readable order summary (used for WhatsApp + POS payload).
      function orderSummary() {
        const lines = [];
        for (const [id, qty] of cart) {
          const it = MENU.find((m) => m.id === id);
          if (it) lines.push({ id, name: it.name, qty, price: it.price, subtotal: it.price * qty });
        }
        return { table: TABLE || null, items: lines, total: money().total };
      }

      async function submitOrder() {
        const name = document.getElementById("custName").value.trim();
        const note = document.getElementById("note").value.trim();
        const order = { ...orderSummary(), customer: name || null, note: note || null };
        if (order.items.length === 0) return;

        // Preferred path: Founder+ POS backend (when configured). Falls back to
        // WhatsApp on any failure so a table order is NEVER silently lost.
        if (CONFIG.posApi) {
          try {
            const res = await fetch(CONFIG.posApi, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(order),
            });
            if (res.ok) { orderDone(); return; }
          } catch (_) { /* fall through to WhatsApp */ }
        }
        openWhatsApp(order);
        orderDone();
      }

      function openWhatsApp(order) {
        const head = `Halo ${CONFIG.storeName}! Pesanan${order.table ? " Meja " + order.table : ""}:`;
        const body = order.items.map((i) => `• ${i.qty}× ${i.name} — ${fmt(i.subtotal)}`).join("\n");
        const foot = `\nTotal: ${fmt(order.total)}` +
          (order.customer ? `\nNama: ${order.customer}` : "") +
          (order.note ? `\nCatatan: ${order.note}` : "");
        const text = encodeURIComponent(`${head}\n${body}${foot}`);
        location.href = `https://wa.me/${CONFIG.whatsapp}?text=${text}`;
      }

      function orderDone() {
        cart.clear();
        renderMenu();
        renderCartBar();
        document.getElementById("sheet").close();
      }

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, (ch) =>
          ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
      }

      // Event delegation for menu +/- buttons.
      document.getElementById("menu").addEventListener("click", (e) => {
        const t = e.target.closest("button");
        if (!t) return;
        if (t.dataset.add) setQty(t.dataset.add, 1);
        else if (t.dataset.inc) setQty(t.dataset.inc, (cart.get(t.dataset.inc) || 0) + 1);
        else if (t.dataset.dec) setQty(t.dataset.dec, (cart.get(t.dataset.dec) || 0) - 1);
      });

      const sheet = document.getElementById("sheet");
      document.getElementById("openSheet").onclick = () => { renderSheet(); sheet.showModal(); };
      document.getElementById("closeSheet").onclick = () => sheet.close();
      document.getElementById("sendOrder").onclick = submitOrder;

      renderHeader();
      renderCats();
      renderMenu();
      renderCartBar();
    </script>
  </body>
</html>
