<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cetak QR Meja — Founder+ POS</title>
    <style>
      :root { --brand:#8b5cf6; --brand-ink:#6d28d9; --ink:#1c1523; --muted:#6b6577;
        --line:#e7e3ee; --bg:#faf9fb; --card:#fff; }
      * { box-sizing: border-box; }
      body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
        color:var(--ink); background:var(--bg); }
      .bar { position:sticky; top:0; z-index:5; background:var(--card); border-bottom:1px solid var(--line);
        padding:14px 20px; display:flex; flex-wrap:wrap; gap:12px; align-items:flex-end; }
      .bar h1 { font-size:17px; margin:0; flex:1 1 100%; letter-spacing:-.01em; }
      .field { display:flex; flex-direction:column; gap:4px; font-size:12px; color:var(--muted); }
      .field input { border:1px solid var(--line); border-radius:10px; padding:9px 11px; font:inherit; color:var(--ink);
        min-width:0; }
      .field input[type=number] { width:90px; }
      .field input[type=text] { width:240px; }
      button { font:inherit; cursor:pointer; }
      .go { background:var(--brand); color:#fff; border:none; padding:10px 18px; border-radius:10px; font-weight:650; }
      .print { background:var(--ink); color:#fff; border:none; padding:10px 18px; border-radius:10px; font-weight:650; }
      .hint { padding:12px 20px; color:var(--muted); font-size:13px; }
      .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:16px; padding:20px; }
      .card { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:18px 16px;
        text-align:center; break-inside:avoid; }
      .card .store { font-size:12px; color:var(--muted); font-weight:600; }
      .card .meja { font-size:22px; font-weight:800; margin:2px 0 10px; letter-spacing:-.02em; }
      .card .qr { width:190px; height:190px; margin:0 auto; }
      .card .qr svg { width:100%; height:100%; display:block; }
      .card .scan { font-size:13px; color:var(--brand-ink); font-weight:650; margin-top:10px; }
      .card .url { font-size:10px; color:var(--muted); word-break:break-all; margin-top:6px; }
      @media print {
        .bar, .hint { display:none; }
        body { background:#fff; }
        .grid { gap:10px; padding:0; grid-template-columns:repeat(3,1fr); }
        .card { border:1px dashed #bbb; border-radius:12px; }
      }
    </style>
  </head>
  <body>
    <div class="bar">
      <h1>🍽️ Cetak QR Meja</h1>
      <label class="field">Nama tempat
        <input id="store" type="text" value="Warung Kopi Founder+" />
      </label>
      <label class="field">URL menu (host publikmu)
        <input id="base" type="text" placeholder="https://tokomu.host.founderplus.id" value="https://tokomu.host.founderplus.id" />
      </label>
      <label class="field">Jumlah meja
        <input id="count" type="number" min="1" max="200" value="12" />
      </label>
      <label class="field">Prefix (opsional)
        <input id="prefix" type="text" placeholder="mis. A" value="" style="width:110px" />
      </label>
      <button class="go" id="gen" type="button">Buat</button>
      <button class="print" id="doPrint" type="button">Print / PDF</button>
    </div>
    <p class="hint">
      Isi URL menu = alamat tempat kamu publish <code>index.html</code> (mis. hasil <code>fp sites publish</code>).
      Tiap meja dapat QR yang membuka <code>…/?meja=&lt;nomor&gt;</code>. Klik <b>Print / PDF</b>, potong, taruh di tiap meja.
    </p>
    <div class="grid" id="grid"></div>

    <script src="qrcode.vendor.js"></script>
    <script>
      const $ = (id) => document.getElementById(id);

      function tableLabels(count, prefix) {
        const out = [];
        for (let i = 1; i <= count; i++) out.push((prefix || "") + i);
        return out;
      }

      function buildUrl(base, label) {
        const clean = base.trim().replace(/\/+$/, "");
        return `${clean}/?meja=${encodeURIComponent(label)}`;
      }

      function qrSvg(text) {
        // Error correction "M" balances density vs. resilience on a laminated
        // table card. typeNumber 0 = auto-fit to the data length.
        const qr = qrcode(0, "M");
        qr.addData(text);
        qr.make();
        return qr.createSvgTag({ cellSize: 6, margin: 2, scalable: true });
      }

      function render() {
        const store = $("store").value.trim() || "Menu";
        const base = $("base").value;
        const count = Math.max(1, Math.min(200, Number($("count").value) || 1));
        const prefix = $("prefix").value.trim();
        const grid = $("grid");
        grid.innerHTML = "";
        for (const label of tableLabels(count, prefix)) {
          const url = buildUrl(base, label);
          const card = document.createElement("div");
          card.className = "card";
          const qrHolder = document.createElement("div");
          qrHolder.className = "qr";
          qrHolder.innerHTML = qrSvg(url);
          card.innerHTML =
            `<div class="store">${escapeHtml(store)}</div>` +
            `<div class="meja">Meja ${escapeHtml(label)}</div>`;
          card.appendChild(qrHolder);
          const scan = document.createElement("div");
          scan.className = "scan"; scan.textContent = "Scan untuk lihat menu & pesan";
          const u = document.createElement("div");
          u.className = "url"; u.textContent = url;
          card.appendChild(scan); card.appendChild(u);
          grid.appendChild(card);
        }
      }

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, (ch) =>
          ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
      }

      $("gen").onclick = render;
      $("doPrint").onclick = () => window.print();
      render();
    </script>
  </body>
</html>
