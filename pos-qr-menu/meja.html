<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Meja — Warung Kopi Founder+</title>
    <meta name="description" content="Kelola status meja & reservasi." />
    <meta name="theme-color" content="#faf9fb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#141019" media="(prefers-color-scheme: dark)" />
    <style>
      :root {
        --brand:#8b5cf6; --brand-ink:#6d28d9; --brand-soft:color-mix(in srgb, var(--brand) 12%, transparent);
        --ink:#1a1420; --secondary:#524b5e; --muted:#857e91;
        --line:#ece8f1; --bg:#faf9fb; --card:#ffffff;
        --ok:#17984e; --warn:#b45309; --info:#1d4ed8; --danger:#c2410c;
        --r-card:18px; --r-ctl:12px;
        --shadow-card:0 1px 2px rgba(26,20,32,.04), 0 4px 14px rgba(26,20,32,.05);
        --shadow-ctl:0 2px 8px rgba(26,20,32,.14), 0 0 0 1px rgba(26,20,32,.04);
        --shadow-pop:0 1px 1px rgba(26,20,32,.05), 0 -8px 40px rgba(26,20,32,.14);
        --ease-out:cubic-bezier(0.23,1,0.32,1); --ease-drawer:cubic-bezier(0.32,0.72,0,1);
        --safe-b:env(safe-area-inset-bottom, 0px); --safe-t:env(safe-area-inset-top, 0px);
      }
      @media (prefers-color-scheme: dark) {
        :root { --ink:#f4eefc; --secondary:#b8b0c6; --muted:#8b8399; --line:#2a2436; --bg:#131019; --card:#1c1626;
          --brand:#a78bfa; --brand-ink:#c4b5fd; --ok:#34d399; --warn:#fbbf24; --info:#93c5fd; --danger:#fb7185;
          --shadow-card:0 1px 2px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.35);
          --shadow-ctl:0 3px 10px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.06);
          --shadow-pop:0 1px 1px rgba(0,0,0,.4),0 -8px 44px rgba(0,0,0,.55); }
      }
      * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
      [hidden] { display:none !important; }
      html, body { margin:0; }
      body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; font-optical-sizing:auto;
        color:var(--ink); background:var(--bg); line-height:1.5; -webkit-font-smoothing:antialiased;
        padding-bottom:calc(28px + var(--safe-b)); }
      header { position:sticky; top:0; z-index:5; display:flex; align-items:center; gap:10px;
        padding:calc(14px + var(--safe-t)) 16px 13px;
        background:color-mix(in srgb, var(--card) 72%, transparent);
        backdrop-filter:saturate(1.8) blur(20px); -webkit-backdrop-filter:saturate(1.8) blur(20px);
        box-shadow:0 1px 0 color-mix(in srgb, var(--line) 60%, transparent); }
      header .store { font-size:18px; font-weight:700; letter-spacing:-0.02em; flex:1; min-width:0;
        white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
      header .tag { font-size:11px; font-weight:700; letter-spacing:.04em; text-transform:uppercase;
        color:var(--brand-ink); background:var(--brand-soft); padding:3px 9px; border-radius:999px; }
      .icon-btn { width:38px; height:38px; border:none; border-radius:999px; cursor:pointer;
        background:var(--card); box-shadow:inset 0 0 0 1px var(--line); color:var(--ink);
        display:grid; place-items:center; transition:transform 150ms var(--ease-out); }
      .icon-btn:active { transform:scale(.9); } .icon-btn svg { width:19px; height:19px; }
      main { max-width:560px; margin:0 auto; padding:14px 16px 8px; }

      .seg { display:flex; gap:4px; padding:4px; background:var(--card); border-radius:999px;
        box-shadow:inset 0 0 0 1px var(--line); margin-bottom:18px; }
      .seg button { flex:1; border:none; background:transparent; cursor:pointer; font:inherit; font-weight:650;
        font-size:14px; color:var(--secondary); padding:9px; border-radius:999px;
        transition:color 160ms var(--ease-out), background 160ms var(--ease-out); }
      .seg button[aria-current="true"] { background:var(--ink); color:var(--card); }

      /* Status legend */
      .legend { display:flex; flex-wrap:wrap; gap:12px; margin:0 2px 14px; font-size:12px; color:var(--secondary); }
      .legend span { display:inline-flex; align-items:center; gap:6px; }
      .dot { width:9px; height:9px; border-radius:999px; }
      .st-available .dot, .dot.available { background:var(--ok); }
      .st-occupied .dot, .dot.occupied { background:var(--warn); }
      .st-reserved .dot, .dot.reserved { background:var(--info); }
      .st-cleaning .dot, .dot.cleaning { background:var(--muted); }

      /* Table grid */
      .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(96px, 1fr)); gap:11px; }
      .tbl { position:relative; border:none; cursor:pointer; font:inherit; text-align:left;
        background:var(--card); border-radius:var(--r-card); padding:14px 13px 13px; box-shadow:var(--shadow-card);
        transition:transform 150ms var(--ease-out); }
      .tbl:active { transform:scale(.97); }
      .tbl .no { font-size:20px; font-weight:800; letter-spacing:-0.02em; }
      .tbl .stt { display:inline-flex; align-items:center; gap:6px; margin-top:8px; font-size:12px; font-weight:600; }
      .tbl.st-available { box-shadow:var(--shadow-card), inset 0 0 0 1px color-mix(in srgb, var(--ok) 26%, transparent); }
      .tbl.st-occupied { background:color-mix(in srgb, var(--warn) 9%, var(--card)); }
      .tbl.st-reserved { background:color-mix(in srgb, var(--info) 9%, var(--card)); }
      .tbl.st-cleaning { opacity:.7; }
      .tbl .stt.available { color:var(--ok); } .tbl .stt.occupied { color:var(--warn); }
      .tbl .stt.reserved { color:var(--info); } .tbl .stt.cleaning { color:var(--muted); }
      .tbl .since { position:absolute; top:13px; right:13px; font-size:11px; color:var(--muted); font-variant-numeric:tabular-nums; }

      /* Reservation list */
      .resv { display:flex; align-items:center; gap:12px; background:var(--card); border-radius:var(--r-card);
        padding:13px 14px; box-shadow:var(--shadow-card); margin-bottom:10px; cursor:pointer;
        transition:transform 150ms var(--ease-out); }
      .resv:active { transform:scale(.99); }
      .resv .when { flex:0 0 58px; text-align:center; }
      .resv .when .hm { font-size:17px; font-weight:800; letter-spacing:-0.02em; font-variant-numeric:tabular-nums; }
      .resv .when .dm { font-size:11px; color:var(--muted); }
      .resv .info { flex:1; min-width:0; }
      .resv .nm { font-weight:650; font-size:15px; letter-spacing:-0.01em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
      .resv .meta { font-size:12.5px; color:var(--muted); margin-top:1px; }
      .rtag { font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.03em; padding:3px 8px; border-radius:999px; }
      .rtag.booked { color:var(--info); background:color-mix(in srgb, var(--info) 13%, transparent); }
      .rtag.seated { color:var(--ok); background:color-mix(in srgb, var(--ok) 14%, transparent); }
      .rtag.done { color:var(--secondary); background:color-mix(in srgb, var(--ink) 8%, transparent); }
      .rtag.no_show, .rtag.cancelled { color:var(--danger); background:color-mix(in srgb, var(--danger) 12%, transparent); }

      .fab { position:fixed; right:18px; bottom:calc(20px + var(--safe-b)); z-index:9;
        height:52px; padding:0 20px; border:none; cursor:pointer; border-radius:999px;
        background:var(--ink); color:var(--card); font:inherit; font-weight:700; font-size:15px;
        box-shadow:0 8px 24px rgba(26,20,32,.28); display:inline-flex; align-items:center; gap:8px;
        transition:transform 150ms var(--ease-out); }
      .fab:active { transform:scale(.96); } .fab svg { width:18px; height:18px; }
      .empty { text-align:center; color:var(--muted); font-size:14px; padding:40px 20px; }

      /* Dialogs */
      dialog { border:none; padding:0; width:100%; max-width:520px; color:var(--ink); background:var(--card);
        box-shadow:var(--shadow-pop); margin:auto auto 0; border-radius:24px 24px 0 0; max-height:92vh;
        transform:translateY(100%); transition:transform 440ms var(--ease-drawer),
          overlay 440ms allow-discrete, display 440ms allow-discrete; }
      dialog[open] { transform:translateY(0); }
      @starting-style { dialog[open] { transform:translateY(100%); } }
      dialog::backdrop { background:rgba(16,10,26,0); backdrop-filter:blur(0);
        transition:background 440ms var(--ease-out), backdrop-filter 440ms var(--ease-out),
          overlay 440ms allow-discrete, display 440ms allow-discrete; }
      dialog[open]::backdrop { background:rgba(16,10,26,.5); backdrop-filter:blur(2px); }
      @starting-style { dialog[open]::backdrop { background:rgba(16,10,26,0); backdrop-filter:blur(0); } }
      .grabber { width:38px; height:5px; border-radius:3px; background:var(--line); margin:10px auto 0; }
      .sin { padding:8px 18px calc(22px + var(--safe-b)); overflow-y:auto; }
      .sin h3 { font-size:18px; letter-spacing:-0.015em; margin:6px 0 4px; }
      .sin .sub { color:var(--muted); font-size:13px; margin-bottom:14px; }
      .sec { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin:16px 0 8px; }
      .close { position:absolute; top:14px; right:16px; width:30px; height:30px; display:grid; place-items:center;
        border:none; border-radius:999px; background:var(--bg); color:var(--muted); font-size:16px; cursor:pointer;
        transition:transform 150ms var(--ease-out); } .close:active { transform:scale(.9); }
      .fld { margin-bottom:11px; } .fld label { display:block; font-size:12.5px; color:var(--secondary); margin-bottom:5px; font-weight:600; }
      .fld input, .fld select { width:100%; border:none; box-shadow:inset 0 0 0 1px var(--line); border-radius:var(--r-ctl);
        padding:11px 12px; font:inherit; background:var(--bg); color:var(--ink); transition:box-shadow 160ms var(--ease-out); }
      .fld input:focus, .fld select:focus { outline:none; box-shadow:inset 0 0 0 2px var(--brand); }
      .row2 { display:flex; gap:10px; } .row2 > * { flex:1; }
      .save { width:100%; margin-top:14px; border:none; cursor:pointer; background:var(--brand); color:#fff;
        font:inherit; font-weight:700; font-size:15px; padding:14px; border-radius:14px;
        box-shadow:0 4px 16px color-mix(in srgb,var(--brand) 30%,transparent); transition:transform 150ms var(--ease-out); }
      .save:active { transform:scale(.98); }
      .choices { display:flex; flex-direction:column; gap:9px; }
      .choice { display:flex; align-items:center; gap:11px; width:100%; border:none; cursor:pointer; text-align:left;
        background:var(--card); box-shadow:inset 0 0 0 1px var(--line); border-radius:14px; padding:14px; font:inherit;
        color:var(--ink); transition:transform 150ms var(--ease-out); }
      .choice:active { transform:scale(.985); }
      .choice .lbl { flex:1; font-weight:650; font-size:15px; }
      .choice.danger .lbl { color:var(--danger); }
      .toast { position:fixed; left:50%; bottom:calc(90px + var(--safe-b)); transform:translateX(-50%) translateY(10px);
        background:var(--ink); color:var(--card); padding:11px 16px; border-radius:999px; font-size:13.5px; font-weight:600;
        box-shadow:0 8px 30px rgba(0,0,0,.28); opacity:0; pointer-events:none; z-index:30;
        transition:opacity 220ms var(--ease-out), transform 220ms var(--ease-out); }
      .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
      @media (prefers-reduced-motion: reduce) {
        dialog, dialog::backdrop, .tbl, .resv, .fab, .icon-btn, .choice, .save { transition:opacity 180ms ease !important; transform:none !important; }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="store" id="hStore">Warung Kopi Founder+</div>
      <span class="tag">Meja</span>
      <button class="icon-btn" id="openTables" aria-label="Atur meja"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg></button>
    </header>

    <main>
      <div class="seg" role="tablist">
        <button id="tabTables" aria-current="true" type="button">Meja</button>
        <button id="tabResv" type="button">Reservasi</button>
      </div>

      <section id="paneTables">
        <div class="legend">
          <span class="st-available"><i class="dot"></i> Kosong</span>
          <span class="st-occupied"><i class="dot"></i> Terisi</span>
          <span class="st-reserved"><i class="dot"></i> Reserved</span>
          <span class="st-cleaning"><i class="dot"></i> Bersihin</span>
        </div>
        <div class="grid" id="tableGrid"></div>
      </section>

      <section id="paneResv" hidden>
        <div id="resvList"></div>
      </section>
    </main>

    <button class="fab" id="fab" type="button" hidden>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      <span id="fabLbl">Reservasi</span>
    </button>

    <!-- Table status picker -->
    <dialog id="tblSheet">
      <div class="grabber"></div>
      <button class="close" id="tblClose" aria-label="Tutup">✕</button>
      <div class="sin">
        <h3>Meja <span id="tblNo">—</span></h3>
        <div class="sub" id="tblSub">Ubah status meja</div>
        <div class="choices" id="tblChoices"></div>
      </div>
    </dialog>

    <!-- Reservation form -->
    <dialog id="resvSheet">
      <div class="grabber"></div>
      <button class="close" id="resvClose" aria-label="Tutup">✕</button>
      <div class="sin">
        <h3 id="resvTitle">Reservasi baru</h3>
        <div class="fld"><label>Nama</label><input id="rNama" type="text" autocomplete="name" /></div>
        <div class="row2">
          <div class="fld"><label>No. HP</label><input id="rHp" inputmode="tel" placeholder="0812…" /></div>
          <div class="fld"><label>Jumlah orang</label><input id="rPax" inputmode="numeric" placeholder="2" /></div>
        </div>
        <div class="row2">
          <div class="fld"><label>Tanggal & jam</label><input id="rWaktu" type="datetime-local" /></div>
          <div class="fld"><label>Meja (opsional)</label><select id="rMeja"></select></div>
        </div>
        <div class="fld" id="rStatusFld" hidden>
          <label>Status</label>
          <select id="rStatus">
            <option value="booked">Booking</option>
            <option value="seated">Duduk (meja terisi)</option>
            <option value="done">Selesai</option>
            <option value="no_show">No-show</option>
            <option value="cancelled">Batal</option>
          </select>
        </div>
        <button class="save" id="rSave" type="button">Simpan reservasi</button>
      </div>
    </dialog>

    <!-- Manage tables -->
    <dialog id="setup">
      <div class="grabber"></div>
      <button class="close" id="setupClose" aria-label="Tutup">✕</button>
      <div class="sin">
        <h3>Atur meja</h3>
        <div class="sub">Jumlah meja & prefix. Status yang ada tetap tersimpan.</div>
        <div class="row2">
          <div class="fld"><label>Jumlah meja</label><input id="sCount" inputmode="numeric" /></div>
          <div class="fld"><label>Prefix (opsional)</label><input id="sPrefix" type="text" placeholder="mis. A" /></div>
        </div>
        <div class="fld"><label>Nama toko</label><input id="sStore" type="text" /></div>
        <button class="save" id="setupSave" type="button">Simpan</button>
      </div>
    </dialog>

    <div class="toast" id="toast"></div>

    <script>
      const LS = "fp_meja_v1";
      const DEF = { store: "Warung Kopi Founder+", count: 8, prefix: "", tables: {}, reservations: [] };
      let db = load();
      function load() { try { return { ...DEF, ...(JSON.parse(localStorage.getItem(LS)) || {}) }; } catch { return { ...DEF }; } }
      function persist() { try { localStorage.setItem(LS, JSON.stringify(db)); } catch {} }
      const $ = (id) => document.getElementById(id);
      const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));

      const STATUSES = [
        { key: "available", label: "Kosong" },
        { key: "occupied", label: "Terisi" },
        { key: "reserved", label: "Reserved" },
        { key: "cleaning", label: "Bersihin" },
      ];
      const statusLabel = (k) => (STATUSES.find((s) => s.key === k) || STATUSES[0]).label;
      const RES_LABEL = { booked: "Booking", seated: "Duduk", done: "Selesai", no_show: "No-show", cancelled: "Batal" };

      function tableCodes() {
        const out = [];
        for (let i = 1; i <= db.count; i++) out.push((db.prefix || "") + i);
        return out;
      }
      const statusOf = (code) => db.tables[code] || "available";

      function renderTables() {
        const grid = $("tableGrid");
        grid.innerHTML = "";
        for (const code of tableCodes()) {
          const st = statusOf(code);
          const b = document.createElement("button");
          b.className = "tbl st-" + st;
          b.type = "button";
          b.dataset.code = code;
          b.innerHTML = `<div class="no">${esc(code)}</div><div class="stt ${st}"><i class="dot ${st}"></i>${statusLabel(st)}</div>`;
          grid.appendChild(b);
        }
      }
      $("tableGrid").addEventListener("click", (e) => {
        const b = e.target.closest(".tbl"); if (!b) return;
        openTblSheet(b.dataset.code);
      });

      let activeCode = null;
      function openTblSheet(code) {
        activeCode = code;
        $("tblNo").textContent = code;
        const cur = statusOf(code);
        $("tblSub").textContent = "Sekarang: " + statusLabel(cur);
        $("tblChoices").innerHTML = STATUSES.map((s) =>
          `<button class="choice" type="button" data-set="${s.key}"><i class="dot ${s.key}" style="width:11px;height:11px"></i><span class="lbl">${s.label}</span>${s.key === cur ? "✓" : ""}</button>`
        ).join("");
        $("tblSheet").showModal();
      }
      $("tblChoices").addEventListener("click", (e) => {
        const b = e.target.closest("[data-set]"); if (!b) return;
        db.tables[activeCode] = b.dataset.set; persist();
        renderTables(); $("tblSheet").close(); toast("Meja " + activeCode + " → " + statusLabel(b.dataset.set));
      });
      $("tblClose").onclick = () => $("tblSheet").close();

      // ── Reservations ──
      function renderResv() {
        const list = $("resvList");
        const items = [...db.reservations].sort((a, b) => new Date(a.startsAt) - new Date(b.startsAt));
        if (!items.length) { list.innerHTML = `<div class="empty">Belum ada reservasi. Tap + Reservasi.</div>`; return; }
        list.innerHTML = "";
        for (const r of items) {
          const d = new Date(r.startsAt);
          const hm = d.toLocaleTimeString("id-ID", { hour: "2-digit", minute: "2-digit" });
          const dm = d.toLocaleDateString("id-ID", { day: "numeric", month: "short" });
          const el = document.createElement("div");
          el.className = "resv";
          el.dataset.id = r.id;
          el.innerHTML =
            `<div class="when"><div class="hm">${hm}</div><div class="dm">${dm}</div></div>` +
            `<div class="info"><div class="nm">${esc(r.customerName)}</div><div class="meta">${r.partySize || 1} orang${r.tableCode ? " · Meja " + esc(r.tableCode) : ""}${r.phone ? " · " + esc(r.phone) : ""}</div></div>` +
            `<span class="rtag ${r.status}">${RES_LABEL[r.status] || r.status}</span>`;
          list.appendChild(el);
        }
      }
      $("resvList").addEventListener("click", (e) => {
        const el = e.target.closest(".resv"); if (!el) return;
        openResvForm(db.reservations.find((r) => r.id === el.dataset.id));
      });

      function fillTableOptions() {
        $("rMeja").innerHTML = `<option value="">—</option>` + tableCodes().map((c) => `<option value="${esc(c)}">Meja ${esc(c)}</option>`).join("");
      }
      let editingId = null;
      function openResvForm(r) {
        editingId = r ? r.id : null;
        fillTableOptions();
        $("resvTitle").textContent = r ? "Ubah reservasi" : "Reservasi baru";
        $("rNama").value = r ? r.customerName : "";
        $("rHp").value = r ? (r.phone || "") : "";
        $("rPax").value = r ? (r.partySize || "") : "";
        $("rWaktu").value = r ? isoToLocalInput(r.startsAt) : defaultWhen();
        $("rMeja").value = r ? (r.tableCode || "") : "";
        $("rStatusFld").hidden = !r;
        if (r) $("rStatus").value = r.status;
        $("resvSheet").showModal();
      }
      function defaultWhen() {
        const d = new Date(); d.setMinutes(0, 0, 0); d.setHours(d.getHours() + 1);
        return isoToLocalInput(d.toISOString());
      }
      function isoToLocalInput(iso) {
        const d = new Date(iso); const p = (n) => String(n).padStart(2, "0");
        return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
      }
      $("rSave").onclick = () => {
        const name = $("rNama").value.trim();
        const when = $("rWaktu").value;
        if (!name) { toast("Isi nama"); return; }
        if (!when) { toast("Isi tanggal & jam"); return; }
        const data = {
          customerName: name,
          phone: $("rHp").value.trim(),
          partySize: Number($("rPax").value) || 1,
          startsAt: new Date(when).toISOString(),
          tableCode: $("rMeja").value || null,
          status: editingId ? $("rStatus").value : "booked",
        };
        if (editingId) {
          const r = db.reservations.find((x) => x.id === editingId);
          Object.assign(r, data);
        } else {
          data.id = "r" + Date.now();
          db.reservations.push(data);
        }
        // Seating a reservation with a table marks that table reserved/occupied.
        if (data.tableCode) {
          if (data.status === "seated") db.tables[data.tableCode] = "occupied";
          else if (data.status === "booked") db.tables[data.tableCode] = "reserved";
        }
        persist(); renderResv(); renderTables();
        $("resvSheet").close(); toast(editingId ? "Reservasi diperbarui" : "Reservasi ditambah");
      };
      $("resvClose").onclick = () => $("resvSheet").close();

      // ── Tabs + FAB ──
      let tab = "tables";
      function setTab(t) {
        tab = t;
        $("tabTables").setAttribute("aria-current", t === "tables");
        $("tabResv").setAttribute("aria-current", t === "resv");
        $("paneTables").hidden = t !== "tables";
        $("paneResv").hidden = t !== "resv";
        $("fab").hidden = t !== "resv";
      }
      $("tabTables").onclick = () => setTab("tables");
      $("tabResv").onclick = () => setTab("resv");
      $("fab").onclick = () => openResvForm(null);

      // ── Setup ──
      $("openTables").onclick = () => {
        $("sCount").value = db.count; $("sPrefix").value = db.prefix; $("sStore").value = db.store;
        $("setup").showModal();
      };
      $("setupSave").onclick = () => {
        db.count = Math.max(1, Math.min(200, Number($("sCount").value) || 8));
        db.prefix = $("sPrefix").value.trim();
        db.store = $("sStore").value.trim() || "Toko";
        persist(); applyChrome(); renderTables(); fillTableOptions();
        $("setup").close(); toast("Tersimpan");
      };
      $("setupClose").onclick = () => $("setup").close();
      document.querySelectorAll("dialog").forEach((d) => d.addEventListener("click", (e) => { if (e.target === d) d.close(); }));

      function applyChrome() { $("hStore").textContent = db.store; document.title = "Meja — " + db.store; }

      let toastT;
      function toast(m) { const el = $("toast"); el.textContent = m; el.classList.add("show"); clearTimeout(toastT); toastT = setTimeout(() => el.classList.remove("show"), 2200); }

      applyChrome(); setTab("tables"); renderTables(); renderResv();
    </script>
  </body>
</html>
