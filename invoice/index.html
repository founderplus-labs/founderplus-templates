<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Invoice / Kwitansi — Generator</title>
    <meta name="description" content="Buat invoice/kwitansi, cetak atau simpan PDF. Tanpa server." />
    <meta name="theme-color" content="#f6f6f7" />
    <style>
      /* ─────────────────────────────────────────────────────────────
         Invoice / kwitansi generator — desain orisinal, self-contained.
         Isi form → pratinjau live → Cetak/PDF (print) atau simpan draft
         (localStorage). Ganti aksen via --accent.
         ───────────────────────────────────────────────────────────── */
      :root {
        --bg:#f2f2f4; --card:#ffffff; --ink:#17171b; --secondary:#55555f; --muted:#8a8a94;
        --line:#e6e6ec; --accent:#8b5cf6; --accent-ink:#6d28d9; --ok:#17984e;
        --r:14px; --ease-out:cubic-bezier(0.23,1,0.32,1); --safe-b:env(safe-area-inset-bottom,0px);
      }
      * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
      body { margin:0; background:var(--bg); color:var(--ink);
        font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; -webkit-font-smoothing:antialiased; line-height:1.5; }
      svg { display:block; } .ico { stroke:currentColor; fill:none; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round; }
      .app { max-width:1080px; margin:0 auto; padding:20px 16px 40px; display:grid; grid-template-columns:1fr; gap:20px; }
      @media (min-width:920px) { .app { grid-template-columns:400px 1fr; align-items:start; } .pane-preview { position:sticky; top:20px; } }

      h1 { font-size:20px; letter-spacing:-0.02em; margin:0 0 2px; }
      .subttl { color:var(--muted); font-size:13.5px; margin:0 0 16px; }

      .panel { background:var(--card); border-radius:var(--r); padding:16px; box-shadow:inset 0 0 0 1px var(--line); }
      .sec { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin:18px 0 10px; }
      .sec:first-child { margin-top:4px; }
      .fld { margin-bottom:10px; } .fld label { display:block; font-size:12px; color:var(--secondary); font-weight:600; margin-bottom:5px; }
      input, textarea { width:100%; border:none; box-shadow:inset 0 0 0 1px var(--line); border-radius:10px; padding:10px 11px;
        font:inherit; background:var(--bg); color:var(--ink); }
      input:focus, textarea:focus { outline:none; box-shadow:inset 0 0 0 2px var(--accent); }
      textarea { resize:vertical; min-height:52px; }
      .row2 { display:flex; gap:10px; } .row2 > * { flex:1; }

      /* Line items editor */
      .item { display:grid; grid-template-columns:1fr 52px 96px 30px; gap:8px; align-items:center; margin-bottom:8px; }
      .item input { padding:9px 10px; }
      .item .qty { text-align:center; } .item .price { text-align:right; font-variant-numeric:tabular-nums; }
      .item .rm { border:none; cursor:pointer; background:transparent; color:var(--muted); width:30px; height:30px; border-radius:8px; display:grid; place-items:center; }
      .item .rm:hover { color:#c2410c; }
      .additem { border:none; cursor:pointer; background:color-mix(in srgb, var(--accent) 12%, transparent); color:var(--accent-ink);
        font:inherit; font-weight:650; font-size:13.5px; padding:10px; border-radius:10px; width:100%; margin-top:2px; }
      .additem:active { transform:scale(0.98); }

      .actions { display:flex; gap:10px; margin-top:18px; flex-wrap:wrap; }
      .btn { flex:1; min-width:120px; border:none; cursor:pointer; font:inherit; font-weight:700; font-size:14.5px; padding:13px; border-radius:12px;
        transition:transform 150ms var(--ease-out); display:inline-flex; align-items:center; justify-content:center; gap:8px; }
      .btn:active { transform:scale(0.98); } .btn svg { width:17px; height:17px; }
      .btn-print { background:var(--ink); color:var(--card); } .btn-save { background:var(--card); color:var(--ink); box-shadow:inset 0 0 0 1px var(--line); }
      .btn-load { background:var(--card); color:var(--ink); box-shadow:inset 0 0 0 1px var(--line); }

      /* Segmented: invoice / kwitansi */
      .seg { display:flex; gap:4px; padding:4px; background:var(--bg); border-radius:999px; box-shadow:inset 0 0 0 1px var(--line); margin-bottom:14px; }
      .seg button { flex:1; border:none; background:transparent; cursor:pointer; font:inherit; font-weight:650; font-size:13.5px; color:var(--secondary); padding:8px; border-radius:999px; }
      .seg button[aria-current="true"] { background:var(--ink); color:var(--card); }

      /* ── Invoice document (the printable part) ── */
      .doc { background:#fff; color:#111; border-radius:16px; box-shadow:0 10px 40px -18px rgba(0,0,0,0.35), inset 0 0 0 1px var(--line);
        padding:40px; max-width:760px; margin:0 auto; }
      .doc .top { display:flex; justify-content:space-between; gap:24px; align-items:flex-start; }
      .doc .biz .logo { width:44px; height:44px; border-radius:12px; display:grid; place-items:center; color:#fff; font-weight:800; font-size:20px;
        background:linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 50%, #f97316)); margin-bottom:12px; }
      .doc .biz .bn { font-weight:700; font-size:17px; letter-spacing:-0.01em; }
      .doc .biz .ba { color:#555; font-size:13px; white-space:pre-line; margin-top:4px; }
      .doc .meta { text-align:right; }
      .doc .meta .kind { font-size:26px; font-weight:800; letter-spacing:-0.02em; text-transform:uppercase; }
      .doc .meta .mrow { font-size:13px; color:#555; margin-top:6px; }
      .doc .meta .mrow b { color:#111; font-weight:600; }
      .doc .bill { margin-top:32px; font-size:13px; color:#555; }
      .doc .bill .to { color:#111; font-weight:600; font-size:15px; margin-top:3px; white-space:pre-line; }
      table { width:100%; border-collapse:collapse; margin-top:24px; font-size:14px; }
      thead th { text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:#888; font-weight:700; padding:0 0 10px; border-bottom:1px solid #e6e6ec; }
      thead th.r, td.r { text-align:right; } thead th.c, td.c { text-align:center; }
      tbody td { padding:12px 0; border-bottom:1px solid #f0f0f2; vertical-align:top; }
      tbody td.r, tbody td.c { font-variant-numeric:tabular-nums; }
      .totals { margin-top:18px; margin-left:auto; width:min(280px,100%); font-size:14px; }
      .totals .tr { display:flex; justify-content:space-between; padding:6px 0; color:#555; }
      .totals .tr.grand { border-top:2px solid #111; margin-top:6px; padding-top:12px; color:#111; font-weight:800; font-size:18px; }
      .totals .tr b, .totals .tr span { font-variant-numeric:tabular-nums; }
      .doc .notes { margin-top:28px; font-size:13px; color:#555; white-space:pre-line; }
      .doc .sign { margin-top:40px; display:flex; justify-content:flex-end; }
      .doc .sign .box { text-align:center; font-size:13px; color:#555; }
      .doc .sign .line { width:170px; border-top:1px solid #bbb; margin-top:56px; padding-top:6px; }
      .doc .foot { margin-top:32px; padding-top:16px; border-top:1px solid #eee; text-align:center; color:#999; font-size:12px; }

      .toast { position:fixed; left:50%; bottom:calc(20px + var(--safe-b)); transform:translateX(-50%) translateY(10px);
        background:var(--ink); color:var(--card); padding:11px 16px; border-radius:999px; font-size:13.5px; font-weight:600;
        box-shadow:0 8px 30px rgba(0,0,0,0.28); opacity:0; pointer-events:none; z-index:30; transition:opacity 220ms, transform 220ms; }
      .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

      @media print {
        @page { margin: 14mm; }
        body { background:#fff; }
        .pane-form, .toast { display:none !important; }
        .app { display:block; padding:0; max-width:none; }
        .pane-preview { position:static !important; }
        .doc { box-shadow:none; border-radius:0; padding:0; max-width:none; }
      }
      @media (prefers-reduced-motion: reduce) { * { transition:none !important; } }
    </style>
  </head>
  <body>
    <div class="app">
      <!-- FORM -->
      <div class="pane-form">
        <h1>Invoice / Kwitansi</h1>
        <p class="subttl">Isi, lalu Cetak atau simpan PDF. Semua di perangkatmu.</p>
        <div class="panel">
          <div class="seg" id="kindSeg">
            <button data-k="INVOICE" aria-current="true" type="button">Invoice</button>
            <button data-k="KWITANSI" type="button">Kwitansi</button>
          </div>

          <div class="sec">Usaha kamu</div>
          <div class="fld"><label>Nama usaha</label><input id="bizName" value="Usaha Kamu" /></div>
          <div class="fld"><label>Alamat / kontak</label><textarea id="bizAddr" rows="2">Jl. Contoh No. 10, Kota
0812-3456-7890</textarea></div>

          <div class="sec">Ditagih ke</div>
          <div class="fld"><label>Nama pelanggan</label><input id="cliName" value="Nama Pelanggan" /></div>
          <div class="fld"><label>Alamat / kontak (opsional)</label><textarea id="cliAddr" rows="2"></textarea></div>

          <div class="sec">Detail</div>
          <div class="row2">
            <div class="fld"><label>Nomor</label><input id="invNo" /></div>
            <div class="fld"><label>Tanggal</label><input id="invDate" type="date" /></div>
          </div>

          <div class="sec">Item</div>
          <div id="items"></div>
          <button class="additem" id="addItem" type="button">+ Tambah baris</button>

          <div class="sec">Pajak &amp; catatan</div>
          <div class="row2">
            <div class="fld"><label>Pajak (%)</label><input id="tax" inputmode="decimal" value="0" /></div>
            <div class="fld"><label>Mata uang</label><input id="cur" value="IDR" /></div>
          </div>
          <div class="fld"><label>Catatan</label><textarea id="notes" rows="2" placeholder="Terima kasih atas kepercayaannya.">Terima kasih atas kepercayaannya.</textarea></div>
          <div class="fld"><label>Nama penanda tangan</label><input id="signName" placeholder="Nama kamu" /></div>

          <div class="actions">
            <button class="btn btn-print" id="print" type="button"><svg class="ico" viewBox="0 0 24 24"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z"/></svg>Cetak / PDF</button>
            <button class="btn btn-save" id="save" type="button">Simpan</button>
            <button class="btn btn-load" id="load" type="button">Muat</button>
          </div>
        </div>
      </div>

      <!-- PREVIEW (printable) -->
      <div class="pane-preview">
        <div class="doc" id="doc">
          <div class="top">
            <div class="biz">
              <div class="logo" id="dLogo">U</div>
              <div class="bn" id="dBizName">Usaha Kamu</div>
              <div class="ba" id="dBizAddr"></div>
            </div>
            <div class="meta">
              <div class="kind" id="dKind">Invoice</div>
              <div class="mrow">No. <b id="dNo">—</b></div>
              <div class="mrow">Tanggal <b id="dDate">—</b></div>
            </div>
          </div>
          <div class="bill">Ditagih ke<div class="to" id="dCli">—</div></div>
          <table>
            <thead><tr><th>Deskripsi</th><th class="c">Qty</th><th class="r">Harga</th><th class="r">Jumlah</th></tr></thead>
            <tbody id="dItems"></tbody>
          </table>
          <div class="totals" id="dTotals"></div>
          <div class="notes" id="dNotes"></div>
          <div class="sign" id="dSignWrap"><div class="box"><div class="line" id="dSign">Hormat kami</div></div></div>
          <div class="foot" id="dFoot"></div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      const LS = "fp_invoice_v1";
      const $ = (id) => document.getElementById(id);
      const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
      const cur = () => ($("cur").value.trim() || "IDR");
      const fmt = (n) => cur() === "IDR" ? "Rp " + Number(n||0).toLocaleString("id-ID") : Number(n||0).toLocaleString("en-US", { minimumFractionDigits: 2 }) + " " + cur();
      let kind = "INVOICE";
      const items = [];

      function addItem(desc = "", qty = 1, price = 0) {
        const id = "it" + Date.now() + Math.round(Math.random() * 1e4);
        items.push({ id, desc, qty, price });
        renderItems();
      }
      function renderItems() {
        const root = $("items"); root.innerHTML = "";
        for (const it of items) {
          const row = document.createElement("div");
          row.className = "item"; row.dataset.id = it.id;
          row.innerHTML =
            `<input placeholder="Deskripsi" value="${esc(it.desc)}" data-f="desc" />` +
            `<input class="qty" inputmode="numeric" value="${esc(it.qty)}" data-f="qty" />` +
            `<input class="price" inputmode="numeric" value="${esc(it.price)}" data-f="price" />` +
            `<button class="rm" type="button" data-rm aria-label="Hapus"><svg class="ico" viewBox="0 0 24 24" style="width:16px;height:16px"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg></button>`;
          root.appendChild(row);
        }
        renderDoc();
      }
      $("items").addEventListener("input", (e) => {
        const inp = e.target.closest("[data-f]"); if (!inp) return;
        const id = inp.closest(".item").dataset.id; const it = items.find((x) => x.id === id); if (!it) return;
        const f = inp.dataset.f;
        it[f] = f === "desc" ? inp.value : Number(String(inp.value).replace(/[^\d.]/g, "")) || 0;
        renderDoc();
      });
      $("items").addEventListener("click", (e) => {
        const b = e.target.closest("[data-rm]"); if (!b) return;
        const id = b.closest(".item").dataset.id; const i = items.findIndex((x) => x.id === id);
        if (i > -1) items.splice(i, 1); renderItems();
      });
      $("addItem").onclick = () => addItem();

      function totals() {
        const sub = items.reduce((s, it) => s + it.qty * it.price, 0);
        const taxPct = Number(String($("tax").value).replace(/[^\d.]/g, "")) || 0;
        const tax = Math.round(sub * taxPct / 100);
        return { sub, taxPct, tax, grand: sub + tax };
      }

      function renderDoc() {
        const biz = $("bizName").value.trim() || "Usaha";
        $("dLogo").textContent = (biz[0] || "U").toUpperCase();
        $("dBizName").textContent = biz;
        $("dBizAddr").textContent = $("bizAddr").value.trim();
        $("dKind").textContent = kind === "KWITANSI" ? "Kwitansi" : "Invoice";
        $("dNo").textContent = $("invNo").value.trim() || "—";
        const dv = $("invDate").value;
        $("dDate").textContent = dv ? new Date(dv + "T00:00:00").toLocaleDateString("id-ID", { day:"numeric", month:"long", year:"numeric" }) : "—";
        $("dCli").textContent = ($("cliName").value.trim() || "—") + ($("cliAddr").value.trim() ? "\n" + $("cliAddr").value.trim() : "");

        $("dItems").innerHTML = items.length
          ? items.map((it) => `<tr><td>${esc(it.desc || "—")}</td><td class="c">${esc(it.qty)}</td><td class="r">${esc(fmt(it.price))}</td><td class="r">${esc(fmt(it.qty * it.price))}</td></tr>`).join("")
          : `<tr><td colspan="4" style="color:#aaa;padding:16px 0">Belum ada item.</td></tr>`;

        const t = totals();
        const rows = [`<div class="tr"><span>Subtotal</span><b>${esc(fmt(t.sub))}</b></div>`];
        if (t.taxPct) rows.push(`<div class="tr"><span>Pajak (${t.taxPct}%)</span><b>${esc(fmt(t.tax))}</b></div>`);
        rows.push(`<div class="tr grand"><span>Total</span><span>${esc(fmt(t.grand))}</span></div>`);
        $("dTotals").innerHTML = rows.join("");

        $("dNotes").textContent = $("notes").value.trim();
        const sign = $("signName").value.trim();
        $("dSignWrap").hidden = false;
        $("dSign").textContent = sign || "Hormat kami";
        $("dFoot").textContent = biz + " · dibuat dengan template Founder+";
      }

      // Live update from any form input
      ["bizName","bizAddr","cliName","cliAddr","invNo","invDate","tax","cur","notes","signName"].forEach((id) => $(id).addEventListener("input", renderDoc));

      // Kind toggle
      $("kindSeg").addEventListener("click", (e) => {
        const b = e.target.closest("[data-k]"); if (!b) return;
        kind = b.dataset.k;
        for (const x of $("kindSeg").children) x.setAttribute("aria-current", x === b);
        renderDoc();
      });

      // Actions
      $("print").onclick = () => window.print();
      $("save").onclick = () => {
        const data = collect(); try { localStorage.setItem(LS, JSON.stringify(data)); toast("Draft tersimpan"); } catch { toast("Gagal menyimpan"); }
      };
      $("load").onclick = () => {
        try {
          const d = JSON.parse(localStorage.getItem(LS)); if (!d) { toast("Belum ada draft"); return; }
          apply(d); toast("Draft dimuat");
        } catch { toast("Gagal memuat"); }
      };
      function collect() {
        return { kind, biz:{ name:$("bizName").value, addr:$("bizAddr").value },
          cli:{ name:$("cliName").value, addr:$("cliAddr").value },
          no:$("invNo").value, date:$("invDate").value, tax:$("tax").value, cur:$("cur").value,
          notes:$("notes").value, sign:$("signName").value,
          items: items.map((it) => ({ desc:it.desc, qty:it.qty, price:it.price })) };
      }
      function apply(d) {
        kind = d.kind || "INVOICE"; for (const x of $("kindSeg").children) x.setAttribute("aria-current", x.dataset.k === kind);
        $("bizName").value = d.biz?.name || ""; $("bizAddr").value = d.biz?.addr || "";
        $("cliName").value = d.cli?.name || ""; $("cliAddr").value = d.cli?.addr || "";
        $("invNo").value = d.no || ""; $("invDate").value = d.date || ""; $("tax").value = d.tax ?? "0"; $("cur").value = d.cur || "IDR";
        $("notes").value = d.notes || ""; $("signName").value = d.sign || "";
        items.length = 0; (d.items || []).forEach((it) => items.push({ id:"it"+Math.random(), desc:it.desc, qty:it.qty, price:it.price }));
        renderItems();
      }

      let toastT;
      function toast(m) { const el = $("toast"); el.textContent = m; el.classList.add("show"); clearTimeout(toastT); toastT = setTimeout(() => el.classList.remove("show"), 2000); }

      // Boot: sensible defaults
      function autoNo() { const d = new Date(); return `INV-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}-001`; }
      $("invNo").value = autoNo();
      $("invDate").value = new Date().toISOString().slice(0, 10);
      addItem("Jasa desain landing page", 1, 1500000);
      addItem("Revisi tambahan", 2, 250000);
      renderDoc();
    </script>
  </body>
</html>
